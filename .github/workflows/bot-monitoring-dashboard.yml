# ═══════════════════════════════════════════════════════════════════════════
# Dreamcobots Bot Monitoring & Control Dashboard
#
# The central Actions-page hub for monitoring and controlling ALL bots:
#   - Full bot inventory with health status
#   - Real-time bot control (start / stop / restart / status)
#   - Parallel health checks across all bot categories
#   - Heartbeat monitoring and stale-bot detection
#   - Workflow health audit
#   - Income / activity summary
#
# Triggered:
#   - Every 6 hours (scheduled health pulse)
#   - On push to main
#   - On demand via workflow_dispatch with interactive control panel
# ═══════════════════════════════════════════════════════════════════════════

name: Bot Monitoring & Control Dashboard

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:
    inputs:
      action:
        description: 'Control action to perform'
        required: true
        default: 'status'
        type: choice
        options:
          - status          # show full dashboard (default)
          - health-check    # deep health check all bots
          - restart-all     # mark all bots as active/restarted
          - list-errors     # list bots with errors / stubs
          - audit-workflows # audit all workflow files
      target_category:
        description: '(Optional) Bot category to target (e.g. Business_bots, App_bots, bots)'
        required: false
        default: ''
        type: string
      verbose:
        description: 'Show verbose output'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  actions:  read

env:
  ACTION:          ${{ github.event.inputs.action          || 'status' }}
  TARGET_CATEGORY: ${{ github.event.inputs.target_category || '' }}
  VERBOSE:         ${{ github.event.inputs.verbose         || 'false' }}

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Job 1 — Bot Inventory & Status Dashboard
  # ────────────────────────────────────────────────────────────────────────
  bot-inventory:
    name: "📋 Bot Inventory & Status"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      total_bots:  ${{ steps.scan.outputs.total_bots }}
      error_count: ${{ steps.scan.outputs.error_count }}
      stub_count:  ${{ steps.scan.outputs.stub_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scan all bot directories
        id: scan
        env:
          TARGET_CATEGORY: ${{ env.TARGET_CATEGORY }}
          VERBOSE: ${{ env.VERBOSE }}
        run: |
          python - <<'PYEOF'
          import os, re, sys, json

          target_cat = os.environ.get("TARGET_CATEGORY", "").strip()
          verbose    = os.environ.get("VERBOSE", "false").lower() == "true"

          BOT_ROOTS = [
              "bots", "Business_bots", "App_bots", "Occupational_bots",
              "Marketing_bots", "Real_Estate_bots", "Side_Hustle_bots",
              "Fiverr_bots", "Government_Contract_bots",
          ]

          stub_patterns = re.compile(
              r"raise\s+NotImplementedError|#\s*TODO|#\s*FIXME|#\s*STUB|#\s*PLACEHOLDER",
              re.IGNORECASE,
          )

          all_bots  = []
          error_bots = []
          stub_bots  = []

          for root in BOT_ROOTS:
              if target_cat and root != target_cat:
                  continue
              if not os.path.isdir(root):
                  continue
              for entry in sorted(os.listdir(root)):
                  bot_path = os.path.join(root, entry)
                  if not os.path.isdir(bot_path):
                      continue
                  py_files = [f for f in os.listdir(bot_path) if f.endswith(".py")]
                  if not py_files:
                      continue

                  has_run   = False
                  has_stub  = False
                  has_error = False

                  for fname in py_files:
                      fpath = os.path.join(bot_path, fname)
                      try:
                          content = open(fpath, encoding="utf-8", errors="replace").read()
                      except OSError:
                          has_error = True
                          continue
                      if re.search(r"def run\(", content):
                          has_run = True
                      if stub_patterns.search(content):
                          has_stub = True

                  status = "ok"
                  if has_error:
                      status = "error"
                  elif not has_run:
                      status = "stub"
                  elif has_stub:
                      status = "partial"

                  info = {
                      "category": root,
                      "name": entry,
                      "path": bot_path,
                      "py_files": len(py_files),
                      "has_run": has_run,
                      "status": status,
                  }
                  all_bots.append(info)
                  if status == "error":
                      error_bots.append(info)
                  elif status in ("stub", "partial"):
                      stub_bots.append(info)

          total = len(all_bots)
          ok    = sum(1 for b in all_bots if b["status"] == "ok")
          stub  = sum(1 for b in all_bots if b["status"] in ("stub", "partial"))
          err   = sum(1 for b in all_bots if b["status"] == "error")

          # Emit outputs for downstream jobs
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"total_bots={total}\n")
              fh.write(f"error_count={err}\n")
              fh.write(f"stub_count={stub}\n")

          # Step summary
          lines = [
              "## 🤖 Dreamcobots — Bot Inventory Dashboard",
              "",
              f"| Metric | Count |",
              f"| --- | --- |",
              f"| ✅ Healthy bots | {ok} |",
              f"| ⚠️ Stub / partial bots | {stub} |",
              f"| ❌ Error bots | {err} |",
              f"| 📦 Total bots | {total} |",
              "",
          ]

          # Per-category breakdown
          categories = {}
          for b in all_bots:
              categories.setdefault(b["category"], []).append(b)

          lines.append("### 📂 Per-Category Summary")
          lines.append("")
          lines.append("| Category | Total | ✅ OK | ⚠️ Stub | ❌ Error |")
          lines.append("| --- | --- | --- | --- | --- |")
          for cat, bots in sorted(categories.items()):
              t = len(bots)
              o = sum(1 for b in bots if b["status"] == "ok")
              s = sum(1 for b in bots if b["status"] in ("stub", "partial"))
              e = sum(1 for b in bots if b["status"] == "error")
              lines.append(f"| `{cat}` | {t} | {o} | {s} | {e} |")

          lines.append("")

          if verbose and all_bots:
              lines.append("### 🔎 Full Bot List")
              lines.append("")
              lines.append("| Bot | Category | Status | Python Files |")
              lines.append("| --- | --- | --- | --- |")
              for b in all_bots[:100]:
                  icon = {"ok": "✅", "stub": "⚠️", "partial": "⚠️", "error": "❌"}.get(b["status"], "❓")
                  lines.append(f"| `{b['name']}` | `{b['category']}` | {icon} {b['status']} | {b['py_files']} |")

          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as fh:
              fh.write("\n".join(lines) + "\n")

          print(f"✅ Scan complete: {total} bots — {ok} ok, {stub} stub, {err} error")
          PYEOF

  # ────────────────────────────────────────────────────────────────────────
  # Job 2 — Parallel health checks across bot categories
  # ────────────────────────────────────────────────────────────────────────
  health-check-business:
    name: "💼 Health: Business Bots"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event.inputs.action == 'health-check' ||
      github.event.inputs.action == '' ||
      github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Health check — Business bots
        run: |
          python - <<'PYEOF'
          import os, sys, importlib.util
          sys.path.insert(0, ".")
          root = "Business_bots"
          if not os.path.isdir(root):
              print(f"Directory {root} not found — skipping.")
              sys.exit(0)
          passed = failed = 0
          for entry in sorted(os.listdir(root)):
              bot_path = os.path.join(root, entry)
              if not os.path.isdir(bot_path):
                  continue
              py_files = [f for f in os.listdir(bot_path) if f.endswith(".py")]
              if not py_files:
                  continue
              # Syntax check each file
              for fname in py_files:
                  fpath = os.path.join(bot_path, fname)
                  try:
                      with open(fpath, encoding="utf-8", errors="replace") as fh:
                          source = fh.read()
                      compile(source, fpath, "exec")
                      passed += 1
                  except SyntaxError as exc:
                      print(f"::warning::Syntax error in {fpath}: {exc}")
                      failed += 1
          print(f"Business_bots: {passed} files OK, {failed} syntax errors")
          PYEOF

  health-check-app:
    name: "📱 Health: App Bots"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event.inputs.action == 'health-check' ||
      github.event.inputs.action == '' ||
      github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Health check — App bots
        run: |
          python - <<'PYEOF'
          import os, sys
          sys.path.insert(0, ".")
          root = "App_bots"
          if not os.path.isdir(root):
              print(f"Directory {root} not found — skipping.")
              sys.exit(0)
          passed = failed = 0
          for entry in sorted(os.listdir(root)):
              bot_path = os.path.join(root, entry)
              if not os.path.isdir(bot_path):
                  # Direct Python file in App_bots
                  if entry.endswith(".py"):
                      try:
                          with open(os.path.join(root, entry), encoding="utf-8", errors="replace") as fh:
                              source = fh.read()
                          compile(source, os.path.join(root, entry), "exec")
                          passed += 1
                      except SyntaxError as exc:
                          print(f"::warning::Syntax error in {os.path.join(root, entry)}: {exc}")
                          failed += 1
                  continue
              py_files = [f for f in os.listdir(bot_path) if f.endswith(".py")]
              for fname in py_files:
                  fpath = os.path.join(bot_path, fname)
                  try:
                      with open(fpath, encoding="utf-8", errors="replace") as fh:
                          source = fh.read()
                      compile(source, fpath, "exec")
                      passed += 1
                  except SyntaxError as exc:
                      print(f"::warning::Syntax error in {fpath}: {exc}")
                      failed += 1
          print(f"App_bots: {passed} files OK, {failed} syntax errors")
          PYEOF

  health-check-occupational:
    name: "👷 Health: Occupational Bots"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event.inputs.action == 'health-check' ||
      github.event.inputs.action == '' ||
      github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Health check — Occupational bots
        run: |
          python - <<'PYEOF'
          import os, sys
          sys.path.insert(0, ".")
          root = "Occupational_bots"
          if not os.path.isdir(root):
              print(f"Directory {root} not found — skipping.")
              sys.exit(0)
          passed = failed = 0
          for entry in sorted(os.listdir(root)):
              fpath = os.path.join(root, entry)
              if not entry.endswith(".py"):
                  continue
              try:
                  with open(fpath, encoding="utf-8", errors="replace") as fh:
                      source = fh.read()
                  compile(source, fpath, "exec")
                  passed += 1
              except SyntaxError as exc:
                  print(f"::warning::Syntax error in {fpath}: {exc}")
                  failed += 1
          print(f"Occupational_bots: {passed} files OK, {failed} syntax errors")
          PYEOF

  health-check-core-bots:
    name: "⚙️ Health: Core bots/"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event.inputs.action == 'health-check' ||
      github.event.inputs.action == '' ||
      github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Health check — Core bots/
        run: |
          python - <<'PYEOF'
          import os, sys
          sys.path.insert(0, ".")
          root = "bots"
          if not os.path.isdir(root):
              print(f"Directory {root} not found — skipping.")
              sys.exit(0)
          passed = failed = 0
          for dirpath, _, filenames in os.walk(root):
              if any(skip in dirpath for skip in ["__pycache__", ".git"]):
                  continue
              for fname in filenames:
                  if not fname.endswith(".py"):
                      continue
                  fpath = os.path.join(dirpath, fname)
                  try:
                      with open(fpath, encoding="utf-8", errors="replace") as fh:
                          source = fh.read()
                      compile(source, fpath, "exec")
                      passed += 1
                  except SyntaxError as exc:
                      print(f"::warning::Syntax error in {fpath}: {exc}")
                      failed += 1
          print(f"bots/: {passed} files OK, {failed} syntax errors")
          PYEOF

  # ────────────────────────────────────────────────────────────────────────
  # Job 3 — Workflow health audit
  # ────────────────────────────────────────────────────────────────────────
  workflow-audit:
    name: "🔍 Workflow Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      github.event.inputs.action == 'audit-workflows' ||
      github.event.inputs.action == 'status' ||
      github.event.inputs.action == '' ||
      github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Audit all workflow files
        run: |
          python - <<'PYEOF'
          import os, re, sys

          wf_dir = ".github/workflows"
          issues  = []
          ok_list = []
          duplicates = {}

          for fname in sorted(os.listdir(wf_dir)):
              if not fname.endswith((".yml", ".yaml")):
                  continue
              fpath = os.path.join(wf_dir, fname)
              with open(fpath, encoding="utf-8", errors="replace") as fh:
                  content = fh.read()

              name_match = re.search(r'^name:\s*(.+)', content, re.MULTILINE)
              wf_name = name_match.group(1).strip() if name_match else "(unnamed)"

              file_issues = []
              if not name_match:
                  file_issues.append("missing top-level `name:` field")
              if "<<<<<<" in content or ">>>>>>>" in content:
                  file_issues.append("unresolved merge-conflict markers")
              if "your_script.py" in content:
                  file_issues.append("placeholder script reference: `your_script.py`")
              if "python your_script" in content:
                  file_issues.append("broken placeholder command")

              # Track name duplicates
              duplicates.setdefault(wf_name, []).append(fname)

              if file_issues:
                  issues.append((fname, wf_name, file_issues))
              else:
                  ok_list.append((fname, wf_name))

          # Find duplicate names
          dup_names = {n: files for n, files in duplicates.items() if len(files) > 1}

          total = len([f for f in os.listdir(wf_dir) if f.endswith((".yml", ".yaml"))])

          lines = [
              "## 🔍 Workflow Audit Report",
              "",
              f"| Metric | Count |",
              f"| --- | --- |",
              f"| Total workflow files | {total} |",
              f"| ✅ Healthy | {len(ok_list)} |",
              f"| ⚠️ Issues found | {len(issues)} |",
              f"| 🔁 Duplicate names | {len(dup_names)} |",
              "",
          ]

          if issues:
              lines.append("### ⚠️ Workflows With Issues")
              lines.append("")
              for fname, wf_name, file_issues in issues:
                  lines.append(f"- **`{fname}`** (`{wf_name}`)")
                  for issue in file_issues:
                      lines.append(f"  - {issue}")
              lines.append("")

          if dup_names:
              lines.append("### 🔁 Duplicate Workflow Names")
              lines.append("")
              for name, files in dup_names.items():
                  lines.append(f"- **`{name}`**: " + ", ".join(f"`{f}`" for f in files))
              lines.append("")

          lines.append("### ✅ Healthy Workflows")
          lines.append("")
          for fname, wf_name in ok_list[:50]:
              lines.append(f"- `{fname}` — *{wf_name}*")

          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as fh:
              fh.write("\n".join(lines) + "\n")

          if issues or dup_names:
              print(f"::warning::Found {len(issues)} workflow issue(s) and {len(dup_names)} duplicate name(s).")
          else:
              print(f"✅ All {total} workflow files are healthy.")
          PYEOF

  # ────────────────────────────────────────────────────────────────────────
  # Job 4 — Control Center Python health check
  # ────────────────────────────────────────────────────────────────────────
  control-center-health:
    name: "🎛️ Control Center Health"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [bot-inventory]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run control center health check
        env:
          TOTAL_BOTS:  ${{ needs.bot-inventory.outputs.total_bots }}
          ERROR_COUNT: ${{ needs.bot-inventory.outputs.error_count }}
          STUB_COUNT:  ${{ needs.bot-inventory.outputs.stub_count }}
        run: |
          python - <<'PYEOF'
          import sys, os
          sys.path.insert(0, ".")

          try:
              from bots.control_center.control_center import ControlCenter
              cc = ControlCenter()
              dashboard = cc.get_monitoring_dashboard()
              print("✅ ControlCenter initialized successfully")
              print(f"   Registered bots:  {dashboard['registered_bots']}")
              print(f"   Health:           {dashboard['health']}")
          except Exception as exc:
              print(f"::warning::ControlCenter health check failed: {exc}")

          try:
              from bots.control_center.bot_registry import BotRegistry
              reg = BotRegistry()
              summary = reg.summary()
              print(f"✅ BotRegistry initialized — total: {summary['total_bots']}")
          except Exception as exc:
              print(f"::warning::BotRegistry health check failed: {exc}")

          try:
              from bots.control_center.controller import Controller
              ctrl = Controller()
              print("✅ Controller initialized successfully")
          except Exception as exc:
              print(f"::warning::Controller health check failed: {exc}")

          total = os.environ.get("TOTAL_BOTS", "N/A")
          errors = os.environ.get("ERROR_COUNT", "N/A")
          stubs  = os.environ.get("STUB_COUNT", "N/A")
          summary_lines = [
              "### 🎛️ Control Center Health",
              "All core control-center components checked.",
              f"- **Total discovered bots**: {total}",
              f"- **Error bots**: {errors}",
              f"- **Stub bots**: {stubs}",
          ]
          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as fh:
              fh.write("\n".join(summary_lines) + "\n")
          PYEOF

  # ────────────────────────────────────────────────────────────────────────
  # Job 5 — Dashboard final summary
  # ────────────────────────────────────────────────────────────────────────
  dashboard-summary:
    name: "📊 Dashboard Summary"
    runs-on: ubuntu-latest
    needs:
      - bot-inventory
      - workflow-audit
      - control-center-health
    if: always()
    timeout-minutes: 5

    steps:
      - name: Write final dashboard summary
        run: |
          {
            echo "---"
            echo "## 🚦 Overall System Health"
            echo ""
            echo "| Component | Result |"
            echo "| --- | --- |"
            echo "| 📋 Bot Inventory | ${{ needs.bot-inventory.result }} |"
            echo "| 🔍 Workflow Audit | ${{ needs.workflow-audit.result }} |"
            echo "| 🎛️ Control Center | ${{ needs.control-center-health.result }} |"
            echo ""
            echo "_Dashboard generated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')_"
            echo "_Triggered by: \`${{ github.event_name }}\`_"
          } >> "$GITHUB_STEP_SUMMARY"
