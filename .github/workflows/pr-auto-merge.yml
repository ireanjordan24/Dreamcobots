# PR Auto-Merge Workflow
#
# Triggered on every pull request event (opened, synchronize, reopened).
# 1. Runs comprehensive CI tests (Node.js + Python).
# 2. Checks for merge conflicts with the base branch.
# 3. If everything passes → auto-merges the PR and deletes the source branch.
# 4. If anything fails → posts a detailed comment and notifies assignees.

name: PR Auto-Merge

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ── 1. Node.js Tests ─────────────────────────────────────────────────────────
  test-node:
    name: Node.js Tests
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.outcome.outputs.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Jest tests
        id: jest
        run: |
          set -o pipefail
          npm test -- --ci 2>&1 | tee /tmp/jest-output.txt
        continue-on-error: true

      - name: Set outcome
        id: outcome
        run: |
          if [ "${{ steps.jest.outcome }}" = "success" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Jest output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jest-output
          path: /tmp/jest-output.txt
          retention-days: 7

  # ── 2. Python Tests ──────────────────────────────────────────────────────────
  test-python:
    name: Python Tests & Framework Compliance
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.outcome.outputs.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Bot framework compliance check
        id: compliance
        run: |
          set -o pipefail
          python tools/check_bot_framework.py 2>&1 | tee /tmp/compliance-output.txt
        continue-on-error: true

      - name: Run pytest
        id: pytest
        run: |
          set -o pipefail
          python -m pytest tests/ \
            --ignore=tests/test_backend.py \
            --ignore=tests/test_web_dashboard.py \
            -q --tb=short \
            2>&1 | tee /tmp/pytest-output.txt
        continue-on-error: true

      - name: Set outcome
        id: outcome
        run: |
          if [ "${{ steps.compliance.outcome }}" = "success" ] && \
             [ "${{ steps.pytest.outcome }}" = "success" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-output
          path: |
            /tmp/pytest-output.txt
            /tmp/compliance-output.txt
          retention-days: 7

  # ── 3. Conflict Detection ─────────────────────────────────────────────────────
  conflict-check:
    name: Merge Conflict Check
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.outcome.outputs.result }}
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Fetch PR head
        run: |
          git fetch origin ${{ github.event.pull_request.head.ref }}:pr-head

      - name: Attempt test merge (conflict detection)
        id: test-merge
        run: |
          git config user.name "dreamco-bot"
          git config user.email "bot@dreamco.ai"
          git merge --no-commit --no-ff pr-head 2>&1 | tee /tmp/merge-output.txt
          MERGE_EXIT=${PIPESTATUS[0]}
          # Always abort to leave the working tree clean
          git merge --abort 2>/dev/null || true
          if [ $MERGE_EXIT -ne 0 ]; then
            echo "conflicts=true" >> "$GITHUB_OUTPUT"
          else
            echo "conflicts=false" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Set outcome
        id: outcome
        run: |
          if [ "${{ steps.test-merge.outputs.conflicts }}" = "false" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload merge output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: merge-conflict-output
          path: /tmp/merge-output.txt
          retention-days: 7

  # ── 4. Auto-Merge ─────────────────────────────────────────────────────────────
  auto-merge:
    name: Auto-Merge PR
    runs-on: ubuntu-latest
    needs: [test-node, test-python, conflict-check]
    if: >
      needs.test-node.outputs.result == 'success' &&
      needs.test-python.outputs.result == 'success' &&
      needs.conflict-check.outputs.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Merge PR and delete branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const prNumber = pr.number;
            const headRef  = pr.head.ref;

            // ── Post success comment ──────────────────────────────────────────
            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber,
              body: [
                '## ✅ DreamCobots Auto-Merge — All Checks Passed',
                '',
                '| Check | Status |',
                '|-------|--------|',
                '| Node.js Tests | ✅ passed |',
                '| Python Tests & Framework Compliance | ✅ passed |',
                '| Merge Conflict Check | ✅ no conflicts |',
                '',
                '🤖 Merging this pull request automatically…',
              ].join('\n'),
            });

            // ── Merge the PR ──────────────────────────────────────────────────
            try {
              await github.rest.pulls.merge({
                owner, repo,
                pull_number: prNumber,
                merge_method: 'merge',
                commit_title: `Auto-merge PR #${prNumber}: ${pr.title}`,
                commit_message: `Automatically merged by DreamCobots PR Auto-Merge workflow.\n\nAll CI checks passed.`,
              });
              console.log(`PR #${prNumber} merged successfully.`);
            } catch (mergeErr) {
              core.setFailed(`Failed to merge PR #${prNumber}: ${mergeErr.message}`);
              return;
            }

            // ── Delete source branch ──────────────────────────────────────────
            if (headRef && headRef !== pr.base.ref) {
              try {
                await github.rest.git.deleteRef({
                  owner, repo,
                  ref: `heads/${headRef}`,
                });
                console.log(`Branch '${headRef}' deleted.`);
              } catch (deleteErr) {
                console.warn(`Could not delete branch '${headRef}': ${deleteErr.message}`);
              }
            }

  # ── 5. Notify on Failure ──────────────────────────────────────────────────────
  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [test-node, test-python, conflict-check]
    if: >
      always() && (
        needs.test-node.outputs.result    == 'failure' ||
        needs.test-python.outputs.result  == 'failure' ||
        needs.conflict-check.outputs.result == 'failure'
      )
    steps:
      - name: Post failure comment and notify assignees
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const prNumber = pr.number;

            const nodeResult     = '${{ needs.test-node.outputs.result }}';
            const pythonResult   = '${{ needs.test-python.outputs.result }}';
            const conflictResult = '${{ needs.conflict-check.outputs.result }}';

            const icon = (r) => r === 'success' ? '✅' : (r === 'skipped' ? '⏭️' : '❌');
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${{ github.run_id }}`;

            const lines = [
              '## ❌ DreamCobots Auto-Merge — Checks Failed',
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| Node.js Tests | ${icon(nodeResult)} ${nodeResult} |`,
              `| Python Tests & Framework Compliance | ${icon(pythonResult)} ${pythonResult} |`,
              `| Merge Conflict Check | ${icon(conflictResult)} ${conflictResult} |`,
              '',
              '**This PR was NOT merged automatically.** Manual intervention is required.',
              '',
            ];

            if (nodeResult === 'failure') {
              lines.push('### 🔧 Node.js Test Failures');
              lines.push('Run `npm test` locally to reproduce and fix the failing tests.');
              lines.push('');
            }
            if (pythonResult === 'failure') {
              lines.push('### 🐍 Python Test / Framework Compliance Failures');
              lines.push('Run `python -m pytest tests/ -q --tb=short` and `python tools/check_bot_framework.py` locally.');
              lines.push('');
            }
            if (conflictResult === 'failure') {
              lines.push('### ⚠️ Merge Conflicts Detected');
              lines.push(`Merge conflicts were found with \`${pr.base.ref}\`. Please rebase or merge the base branch into your branch and resolve conflicts.`);
              lines.push('');
            }

            lines.push(`🔗 [View full workflow logs](${runUrl})`);
            lines.push('');

            // Mention assignees if any
            const assignees = (pr.assignees || []).map(a => `@${a.login}`);
            if (assignees.length > 0) {
              lines.push(`📣 Assignees notified for manual intervention: ${assignees.join(', ')}`);
            } else {
              lines.push('📣 No assignees set — please assign someone to review and fix the issues above.');
            }

            const body = lines.join('\n');

            // Find existing bot comment and update, or create new
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('DreamCobots Auto-Merge')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body,
              });
            }
