name: Auto Recovery CI Mechanism

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-recover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check bot framework compliance
        run: python tools/check_bot_framework.py

      - name: Run Tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_backend.py \
            --ignore=tests/test_web_dashboard.py \
            -q --tb=short

      - name: Report status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ All tests passed — branch is merge-ready."
          else
            echo "❌ Tests or checks failed — review the output above to diagnose."
          fi
