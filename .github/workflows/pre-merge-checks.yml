name: Pre-Merge Checks\n\non: [pull_request]\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n    - name: Checkout code\n      uses: actions/checkout@v2\n\n    - name: Setup Node.js\n      uses: actions/setup-node@v2\n      with:\n        node-version: '14'\n\n    - name: Install dependencies\n      run: npm install\n\n    - name: Run linting\n      run: npm run lint\n\n    - name: Check file existence\n      run: |\n        if [ ! -f path/to/your/file.js ]; then\n          echo 'Required file does not exist!';\n          exit 1;\n        fi\n\n    - name: Run tests\n      run: npm test\n