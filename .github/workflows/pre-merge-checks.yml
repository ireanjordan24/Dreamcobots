name: Pre-Merge Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pre-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run linting
        run: npm run lint

      - name: Check critical file existence
        run: |
          for f in index.js package.json README.md requirements.txt framework/__init__.py tools/check_bot_framework.py; do
            if [ ! -f "$f" ]; then
              echo "❌ Required file missing: $f"
              exit 1
            fi
            echo "✅ $f"
          done

      - name: Run tests
        run: npm test
