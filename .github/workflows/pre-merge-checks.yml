name: Pre-Merge Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pre-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node.js dependencies
        run: npm install --legacy-peer-deps

      - name: Install Python dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run linting
        run: npm run lint

      - name: Check critical file existence
        run: |
          for f in index.js package.json README.md requirements.txt framework/__init__.py tools/check_bot_framework.py; do
            if [ ! -f "$f" ]; then
              echo "❌ Required file missing: $f"
              exit 1
            fi
            echo "✅ $f"
          done

      - name: Run bot framework compliance check
        run: python tools/check_bot_framework.py

      - name: Run Node.js tests
        run: npm test

      - name: Run Python tests
        run: python -m pytest tests/ --ignore=tests/test_backend.py --ignore=tests/test_web_dashboard.py -q --tb=short
