name: CI/CD Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # ── Step 1: Debug Context (always runs) ────────────────────────────────
      - name: Debug Context
        if: always()
        run: |
          echo "Workflow: ${{ github.workflow }}"
          echo "Job: ${{ github.job }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Actor: ${{ github.actor }}"

      # ── Step 2: Mask Secrets ───────────────────────────────────────────────
      # Mask the secret VALUE so it never appears in logs.
      # The add-mask command accepts the resolved secret value, not the key name.
      - name: Mask Secrets
        run: |
          API_KEY_VALUE="${{ secrets.API_KEY }}"
          if [ -n "$API_KEY_VALUE" ]; then
            echo "::add-mask::$API_KEY_VALUE"
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 3: Pre-Check Validation ──────────────────────────────────────
      - name: Validate Environment
        run: |
          echo "Validating environment prerequisites..."
          if ! command -v node &> /dev/null; then
            echo "::error::Node.js is not installed"
            exit 1
          fi
          if ! command -v npm &> /dev/null; then
            echo "::error::npm is not installed"
            exit 1
          fi
          echo "Environment validation passed."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Step 4: Retry Logic for Install ───────────────────────────────────
      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            npm install && break
            echo "Retry $i failed..."
            sleep $((i * 5))
            if [ $i -eq 3 ]; then
              echo "::error::npm install failed after 3 attempts"
              exit 1
            fi
          done

      # ── Step 5: Run tests ─────────────────────────────────────────────────
      - name: Run tests
        id: run_tests
        run: npm test
        continue-on-error: true

      # ── Step 6: Circuit Breaker ────────────────────────────────────────────
      # Fail immediately when the test step fails (threshold = 1 tracked step).
      - name: Circuit Breaker — Enforce test gate
        run: |
          if [ "${{ steps.run_tests.outcome }}" = "failure" ]; then
            echo "::error::Test step failed — stopping pipeline."
            exit 1
          fi
          echo "Circuit breaker: all tracked steps passed."

      # ── Step 7: Upload Logs on Failure ────────────────────────────────────
      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-test
          path: |
            logs/
            npm-debug.log*
          if-no-files-found: ignore

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      # ── Step 1: Debug Context (always runs) ────────────────────────────────
      - name: Debug Context
        if: always()
        run: |
          echo "Workflow: ${{ github.workflow }}"
          echo "Job: ${{ github.job }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Actor: ${{ github.actor }}"

      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Deploy to Production ──────────────────────────────────────
      # TODO: Replace the echo below with your actual deployment command
      # (e.g., ssh, kubectl, cloud provider CLI).
      - name: Deploy to Production
        id: deploy_step
        run: |
          echo "Deploying to Production"
          # Add your deployment commands here.
        continue-on-error: true

      # ── Step 3: Error Classification ──────────────────────────────────────
      - name: Classify deploy error
        if: steps.deploy_step.outcome == 'failure'
        run: |
          OUTCOME="${{ steps.deploy_step.outcome }}"
          echo "Deploy step outcome: $OUTCOME"
          if [ "$OUTCOME" = "failure" ]; then
            echo "::error::Deploy failed — check credentials, permissions, and target availability"
            echo "Common causes: 401 (token expired), 403 (permissions), 404 (target missing), 5xx (server error)"
          fi
          exit 1

      # ── Step 4: Upload Logs on Failure ────────────────────────────────────
      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-deploy
          path: |
            logs/
          if-no-files-found: ignore

  monitor:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      # ── Step 1: Debug Context (always runs) ────────────────────────────────
      - name: Debug Context
        if: always()
        run: |
          echo "Workflow: ${{ github.workflow }}"
          echo "Job: ${{ github.job }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Actor: ${{ github.actor }}"

      - name: Monitor Application
        run: |
          echo "Monitoring Application"
          # Add your monitoring commands or alert configurations here.

  # ── Error Handling Job ─────────────────────────────────────────────────────
  error_handling:
    if: failure()
    needs: [test, deploy, monitor]
    runs-on: ubuntu-latest
    steps:
      # ── Step 1: Debug Context (always runs) ────────────────────────────────
      - name: Debug Context
        if: always()
        run: |
          echo "Workflow: ${{ github.workflow }}"
          echo "Job: ${{ github.job }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Actor: ${{ github.actor }}"

      # ── Step 2: Error Classification ──────────────────────────────────────
      - name: Classify and Report Failure
        run: |
          echo "::error::One or more jobs failed in workflow run ${{ github.run_id }}"
          echo "Failed workflow: ${{ github.workflow }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "::error::Test job failed — check test logs above"
          fi
          if [ "${{ needs.deploy.result }}" = "failure" ]; then
            echo "::error::Deploy job failed — check deploy logs above"
          fi
          if [ "${{ needs.monitor.result }}" = "failure" ]; then
            echo "::error::Monitor job failed — check monitor logs above"
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 3: Upload Error Logs ──────────────────────────────────────────
      - name: Upload Error Logs
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-${{ github.run_id }}
          path: |
            logs/
            npm-debug.log*
          if-no-files-found: ignore

      # ── Step 4: Notify of Failure ──────────────────────────────────────────
      - name: Notify of Failure
        run: |
          echo "Notifying developers of failure..."
          echo "Workflow '${{ github.workflow }}' failed on run ${{ github.run_id }}"
          echo "Review: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Add notification service commands here (e.g., Slack, email).