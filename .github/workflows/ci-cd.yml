name: CI/CD Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # ── Step 1: Debug Context (always runs) ────────────────────────────────
      - name: Debug Context
        if: always()
        run: |
          echo "Workflow: ${{ github.workflow }}"
          echo "Job: ${{ github.job }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Actor: ${{ github.actor }}"

      # ── Step 8: Mask Secrets ───────────────────────────────────────────────
      - name: Mask Secrets
        run: |
          echo "::add-mask::${{ secrets.API_KEY }}"

      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 9: Pre-Check Validation ──────────────────────────────────────
      - name: Validate Environment
        run: |
          echo "Validating environment prerequisites..."
          if ! command -v node &> /dev/null; then
            echo "::error::Node.js is not installed"
            exit 1
          fi
          if ! command -v npm &> /dev/null; then
            echo "::error::npm is not installed"
            exit 1
          fi
          echo "Environment validation passed."

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      # ── Step 3: Retry Logic for Install ───────────────────────────────────
      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            npm install && break
            echo "Retry $i failed..."
            sleep $((i * 5))
            if [ $i -eq 3 ]; then
              echo "::error::npm install failed after 3 attempts"
              exit 1
            fi
          done

      # ── Step 2: continue-on-error for controlled failures ─────────────────
      - name: Run tests
        id: run_tests
        run: npm test
        continue-on-error: true

      # ── Step 5: Circuit Breaker ────────────────────────────────────────────
      - name: Circuit Breaker — Check failure threshold
        run: |
          FAILURES=0
          MAX=3
          # Count failures among tracked steps in this job
          if [ "${{ steps.run_tests.outcome }}" = "failure" ]; then
            FAILURES=$((FAILURES+1))
          fi
          echo "Circuit breaker: $FAILURES/$MAX failures in this run."
          if [ $FAILURES -ge $MAX ]; then
            echo "::error::Too many failures — stopping system"
            exit 1
          fi

      # ── Step 2: Handle test failure ────────────────────────────────────────
      - name: Handle test failure
        if: steps.run_tests.outcome == 'failure'
        run: |
          echo "::warning::Tests failed, check logs above for details."
          exit 1

      # ── Step 6: Upload Logs on Failure ────────────────────────────────────
      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-test
          path: |
            logs/
            npm-debug.log*
          if-no-files-found: ignore

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      # ── Step 1: Debug Context (always runs) ────────────────────────────────
      - name: Debug Context
        if: always()
        run: |
          echo "Workflow: ${{ github.workflow }}"
          echo "Job: ${{ github.job }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Actor: ${{ github.actor }}"

      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: continue-on-error for controlled failures ─────────────────
      - name: Deploy to Production
        id: deploy_step
        run: |
          echo "Deploying to Production"
          # Add your deployment commands here. E.g., using SSH, FTP, or cloud provider.
        continue-on-error: true

      # ── Step 4: Error Classification ──────────────────────────────────────
      - name: Classify deploy error
        if: steps.deploy_step.outcome == 'failure'
        run: |
          OUTCOME="${{ steps.deploy_step.outcome }}"
          echo "Deploy step outcome: $OUTCOME"
          # Classify based on step outcome (extend with exit-code outputs as needed)
          if [ "$OUTCOME" = "failure" ]; then
            echo "::error::Deploy failed — check credentials, permissions, and target availability"
            echo "Common causes: 401 (token expired), 403 (permissions), 404 (target missing), 5xx (server error)"
          fi
          exit 1

      # ── Step 7: Fallback Strategy ─────────────────────────────────────────
      - name: Fallback Strategy
        if: failure()
        run: |
          echo "::warning::Primary deploy failed, switching to backup system..."
          echo "Attempting backup deployment process..."
          # Add backup deployment logic here (e.g., switch provider, use cached build)

      # ── Step 10: Auto-Rollback on failure ────────────────────────────────
      - name: Rollback
        if: failure()
        run: |
          echo "Rolling back deployment..."
          # Check out the previous commit's files locally
          git checkout HEAD~1 -- . 2>/dev/null || echo "No previous commit to roll back to."
          # Re-run deployment with the rolled-back files
          echo "Re-deploying previous stable version..."
          # Add your actual re-deployment command here (e.g., ssh deploy, kubectl rollout undo)

      # ── Step 6: Upload Logs on Failure ────────────────────────────────────
      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-deploy
          path: |
            logs/
          if-no-files-found: ignore

  monitor:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      # ── Step 1: Debug Context (always runs) ────────────────────────────────
      - name: Debug Context
        if: always()
        run: |
          echo "Workflow: ${{ github.workflow }}"
          echo "Job: ${{ github.job }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Actor: ${{ github.actor }}"

      - name: Monitor Application
        run: |
          echo "Monitoring Application"
          # Add your monitoring commands or alert configurations here.

  # ── Error Handling Job ─────────────────────────────────────────────────────
  error_handling:
    if: failure()
    needs: [test, deploy, monitor]
    runs-on: ubuntu-latest
    steps:
      # ── Step 1: Debug Context (always runs) ────────────────────────────────
      - name: Debug Context
        if: always()
        run: |
          echo "Workflow: ${{ github.workflow }}"
          echo "Job: ${{ github.job }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Actor: ${{ github.actor }}"

      # ── Step 4: Error Classification ──────────────────────────────────────
      - name: Classify and Report Failure
        run: |
          echo "::error::One or more jobs failed in workflow run ${{ github.run_id }}"
          echo "Failed workflow: ${{ github.workflow }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

          # Determine which job failed
          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "::error::Test job failed — check test logs above"
          fi
          if [ "${{ needs.deploy.result }}" = "failure" ]; then
            echo "::error::Deploy job failed — check deploy logs above"
          fi
          if [ "${{ needs.monitor.result }}" = "failure" ]; then
            echo "::error::Monitor job failed — check monitor logs above"
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 6: Upload Logs on Failure ────────────────────────────────────
      - name: Upload Error Logs
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-${{ github.run_id }}
          path: |
            logs/
            npm-debug.log*
          if-no-files-found: ignore

      # ── Step 7: Fallback / Self-Healing Notification ─────────────────────
      - name: Notify of Failure
        run: |
          echo "Notifying developers of failure..."
          echo "Workflow '${{ github.workflow }}' failed on run ${{ github.run_id }}"
          echo "Review: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Add notification service commands here (e.g., Slack, email).