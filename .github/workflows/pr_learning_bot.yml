name: PR Learning Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run PR Learning Bot
        run: |
          if [ -f bots/pr_learning_bot.py ]; then
            python bots/pr_learning_bot.py
          else
            echo "::warning::bots/pr_learning_bot.py not found — skipping."
          fi