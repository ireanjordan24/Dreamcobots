name: Bot CI/CD Pipeline

on:
  push:
    branches: [main, "feature/**", "bot/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: pip install flake8

      - name: Run flake8
        run: flake8 bots/ core/ framework/ --max-line-length=120 --extend-ignore=E203,W503

  # ---------------------------------------------------------------------------
  # Unit tests
  # ---------------------------------------------------------------------------
  test:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run Python tests
        run: |
          python3 -m pytest tests/ \
            --ignore=tests/test_backend.py \
            --ignore=tests/test_web_dashboard.py \
            -q --tb=short

  # ---------------------------------------------------------------------------
  # Framework compliance check
  # ---------------------------------------------------------------------------
  framework-check:
    name: Bot Framework Compliance
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check bot framework compliance
        run: python3 tools/check_bot_framework.py

  # ---------------------------------------------------------------------------
  # Deploy (main branch only)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, framework-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Log deployment event
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import os, json
          from datetime import datetime, timezone

          event = {
            "event": "deploy",
            "repo": os.environ.get("GITHUB_REPOSITORY", ""),
            "sha": os.environ.get("GITHUB_SHA", ""),
            "ref": os.environ.get("GITHUB_REF", ""),
            "deployed_at": datetime.now(timezone.utc).isoformat(),
          }
          print(json.dumps(event, indent=2))
          EOF

      - name: Register orchestrator bots
        run: |
          python3 - <<'EOF'
          import sys
          sys.path.insert(0, ".")
          from bots.buddy_orchestrator import BuddyOrchestrator
          orch = BuddyOrchestrator()
          print("BuddyOrchestrator initialised successfully.")
          s = orch.status()
          print(f"Catalog size: {s['catalog_size']}")
          print(f"Scraping active: {s['scraping_active']}")
          EOF
