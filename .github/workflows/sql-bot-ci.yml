name: SQL Bot CI

on:
  push:
    branches: [main, master]
    paths:
      - "bots/sql_bot/**"
      - "tests/test_sql_bot.py"
      - ".github/workflows/sql-bot-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "bots/sql_bot/**"
      - "tests/test_sql_bot.py"
      - ".github/workflows/sql-bot-ci.yml"
  schedule:
    # Run every 24 hours to ensure the SQL bot pipeline stays healthy
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sql-bot-tests:
    name: SQL Bot — unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run SQL Bot tests
        run: pytest tests/test_sql_bot.py -v

  sql-bot-safety-checks:
    name: SQL Bot — safety guardrail validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate SQL query safety guardrails
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, ".")
          from bots.sql_bot.sql_bot import validate_query, SafetyViolation

          BLOCKED = [
              "DROP TABLE users",
              "DROP DATABASE mydb",
              "TRUNCATE TABLE orders",
              "ALTER TABLE users ADD COLUMN age INTEGER",
              "ATTACH DATABASE 'other.db' AS other",
              "DELETE FROM users",
              "DELETE FROM orders;",
              "PRAGMA writable_schema = ON",
          ]
          ALLOWED = [
              "SELECT * FROM users",
              "INSERT INTO users (name) VALUES ('Alice')",
              "UPDATE users SET name = 'Bob' WHERE id = 1",
              "DELETE FROM users WHERE id = 1",
              "CREATE TABLE IF NOT EXISTS items (id INTEGER PRIMARY KEY)",
              "SELECT COUNT(*) FROM orders GROUP BY status",
          ]

          errors = []
          for sql in BLOCKED:
              try:
                  validate_query(sql)
                  errors.append(f"FAIL: should have been blocked — {sql!r}")
              except SafetyViolation:
                  print(f"  BLOCKED (correct): {sql!r}")

          for sql in ALLOWED:
              try:
                  validate_query(sql)
                  print(f"  ALLOWED (correct): {sql!r}")
              except SafetyViolation as e:
                  errors.append(f"FAIL: should have been allowed — {sql!r}: {e}")

          if errors:
              for err in errors:
                  print(err, file=sys.stderr)
              sys.exit(1)

          print("\n✅ All safety guardrail checks passed.")
          EOF

  sql-bot-db-integrity:
    name: SQL Bot — database integrity checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run database integrity checks
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, ".")
          from bots.sql_bot.sql_bot import SQLBot

          bot = SQLBot()

          # Build a test schema
          bot.create_table("customers", [
              ("id",    "INTEGER PRIMARY KEY"),
              ("name",  "TEXT NOT NULL"),
              ("email", "TEXT"),
              ("spend", "REAL DEFAULT 0.0"),
          ])
          bot.create_table("orders", [
              ("id",          "INTEGER PRIMARY KEY"),
              ("customer_id", "INTEGER NOT NULL"),
              ("amount",      "REAL NOT NULL"),
              ("status",      "TEXT DEFAULT 'pending'"),
          ])

          # Seed data
          bot.insert_many("customers", [
              {"id": 1, "name": "Alice", "email": "alice@dreamco.ai", "spend": 500.0},
              {"id": 2, "name": "Bob",   "email": "bob@dreamco.ai",   "spend": 300.0},
              {"id": 3, "name": "Carol", "email": None,               "spend": 150.0},
          ])
          bot.insert_many("orders", [
              {"id": 1, "customer_id": 1, "amount": 120.0, "status": "completed"},
              {"id": 2, "customer_id": 1, "amount":  80.0, "status": "completed"},
              {"id": 3, "customer_id": 2, "amount": 200.0, "status": "pending"},
          ])

          # Integrity check
          integrity = bot.check_integrity()
          assert integrity["passed"], f"Integrity check failed: {integrity['issues']}"
          print("✅ Integrity check passed.")

          # Null detection
          nulls = bot.find_null_columns("customers")
          assert "email" in nulls, "Expected NULL email column not detected"
          print(f"✅ NULL detection passed: {nulls}")

          # Summary report
          report = bot.generate_summary_report()
          assert report["total_tables"] == 2
          assert report["total_rows"] == 6
          print(f"✅ Summary report passed: {report['total_tables']} tables, {report['total_rows']} rows.")

          # Top-N report
          top = bot.generate_top_n_report("customers", "spend", "name", n=2)
          assert len(top["rows"]) == 2
          print(f"✅ Top-N report passed: {top['rows']}")

          # Session stats
          stats = bot.get_stats()
          assert stats["total_queries"] > 0
          print(f"✅ Session stats: {stats['total_queries']} queries executed.")

          bot.close()
          print("\n✅ All database integrity checks passed.")
          EOF

  sql-bot-lint:
    name: SQL Bot — lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint SQL Bot source
        run: |
          flake8 bots/sql_bot/ \
            --max-line-length=120 \
            --ignore=E501,W503,E302 \
            --statistics \
            --exit-zero

  bot-library-registration:
    name: Bot Library — SQL Bot registration check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify SQL Bot is registered in the bot library
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, ".")
          from bots.global_bot_network.bot_library import BotLibrary, BotNotFound

          lib = BotLibrary()
          lib.populate_dreamco_bots()

          for bot_id in ("sql_bot", "god_mode_bot"):
              try:
                  entry = lib.get_bot(bot_id)
                  print(f"✅ {bot_id} found: {entry.display_name}")
              except BotNotFound:
                  print(f"❌ {bot_id} not found in bot library", file=sys.stderr)
                  sys.exit(1)

          print(f"\n✅ Bot library check passed. Total bots: {lib.count()}")
          EOF

  summary:
    name: SQL Bot CI — All checks passed
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - sql-bot-tests
      - sql-bot-safety-checks
      - sql-bot-db-integrity
      - sql-bot-lint
      - bot-library-registration
    steps:
      - name: All SQL Bot CI jobs passed
        run: echo "✅ SQL Bot CI pipeline is fully operational."
