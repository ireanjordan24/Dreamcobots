name: Timed Monitoring System

on:
  workflow_dispatch:
    inputs:
      dispatch_all_workflows:
        description: "Dispatch all connected workflows after checks"
        required: false
        default: "true"
      run_full_suite:
        description: "Run both JS and focused Python tests"
        required: false
        default: "false"
  workflow_call:
    inputs:
      dispatch_all_workflows:
        description: Dispatch all connected workflows.
        required: false
        type: string
        default: "true"
      run_full_suite:
        description: Run full monitoring checks.
        required: false
        type: string
        default: "false"
  schedule:
    # Every 6 hours at 00:00, 06:00, 12:00, and 18:00 UTC.
    - cron: "0 */6 * * *"

jobs:
  monitor:
    name: Monitor workflows, detect anomalies, optimize bots
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm ci

      - name: Detect repository anomalies
        run: |
          python -m compileall bots scripts framework core
          python -m pytest tests/test_company_lookup_bot.py tests/test_integration_feedback_bot.py -q
          if [ "${{ inputs.run_full_suite || github.event.inputs.run_full_suite || 'false' }}" = "true" ]; then
            npm run test -- --passWithNoTests
          fi

      - name: Generate bot learning and optimization report
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          
          baseline_raw = os.getenv("BASELINE_ACCURACY", "0.92")
          current_raw = os.getenv("CURRENT_ACCURACY", "0.84")
          try:
              baseline_accuracy = float(baseline_raw)
              current_accuracy = float(current_raw)
          except ValueError as exc:
              raise ValueError(
                  f"BASELINE_ACCURACY and CURRENT_ACCURACY must be numeric. "
                  f"Got BASELINE_ACCURACY={baseline_raw!r}, CURRENT_ACCURACY={current_raw!r}."
              ) from exc
          accuracy_delta = baseline_accuracy - current_accuracy
          drift = max(0.0, accuracy_delta)
          threshold = 0.05
          drift_detected = drift > threshold
          
          if not drift_detected:
              recommended_method = "none"
          elif drift < 0.10:
              recommended_method = "transfer_learning"
          elif drift < 0.20:
              recommended_method = "fine_tuning"
          else:
              recommended_method = "full_retrain"
          
          learning_report = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "accuracy_delta": accuracy_delta,
              "drift_detected": drift_detected,
              "recommended_method": recommended_method,
              "recommendation_summary": "Use automated retraining strategy when monitored accuracy drops.",
          }

          with open("monitoring-learning-report.json", "w", encoding="utf-8") as f:
              json.dump(learning_report, f, indent=2)

          print(json.dumps(learning_report, indent=2))
          PY

      - name: Upload monitoring report
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-learning-report
          path: monitoring-learning-report.json

      - name: Dispatch connected workflows
        if: ${{ (inputs.dispatch_all_workflows || github.event.inputs.dispatch_all_workflows || 'true') == 'true' }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ref = context.ref.replace('refs/heads/', '');
            const workflows = [
              { id: '24hour-button.yml', inputs: { run_monitoring: 'false' } },
              { id: 'company-lookup.yml', inputs: { companies: 'Stripe,OpenAI', tier: 'pro' } },
              { id: 'integration-feedback.yml', inputs: { platform: 'Timed Monitoring', status: 'success', details: 'Scheduled monitoring heartbeat', tier: 'pro' } },
              { id: 'integration_lookup.yml', inputs: { query: 'automation reliability tooling' } },
              { id: 'buddy-system.yml', inputs: { action: 'test', prompt: 'Timed monitoring initiated system test', run_full_suite: 'true' } },
            ];
            for (const workflow of workflows) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflow.id,
                ref,
                inputs: workflow.inputs,
              });
              core.info(`Dispatched ${workflow.id}`);
            }
