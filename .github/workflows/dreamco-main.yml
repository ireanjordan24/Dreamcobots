name: DreamCo Main — Run & Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CI: true

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Node.js — Validate JS bots & orchestrator
  # ──────────────────────────────────────────────
  dreamco-js-bots:
    name: JS Bots & Orchestrator
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root Node dependencies
        run: npm install --legacy-peer-deps

      - name: Smoke-test — realEstateBot
        run: |
          node -e "
            const bot = require('./DreamCo/bots/realEstateBot');
            const out = bot.run();
            console.log('realEstateBot output:', JSON.stringify(out, null, 2));
            if (typeof out.revenue !== 'number') throw new Error('Missing revenue field');
            if (typeof out.leads_generated !== 'number') throw new Error('Missing leads_generated field');
            if (typeof out.conversion_rate !== 'number') throw new Error('Missing conversion_rate field');
            console.log('realEstateBot: PASSED');
          "

      - name: Smoke-test — contractBot
        run: |
          node -e "
            const bot = require('./DreamCo/bots/contractBot');
            const out = bot.run();
            console.log('contractBot output:', JSON.stringify(out, null, 2));
            if (typeof out.revenue !== 'number') throw new Error('Missing revenue field');
            if (typeof out.leads_generated !== 'number') throw new Error('Missing leads_generated field');
            if (typeof out.conversion_rate !== 'number') throw new Error('Missing conversion_rate field');
            console.log('contractBot: PASSED');
          "

      - name: Smoke-test — jobBot
        run: |
          node -e "
            const bot = require('./DreamCo/bots/jobBot');
            const out = bot.run();
            console.log('jobBot output:', JSON.stringify(out, null, 2));
            if (typeof out.revenue !== 'number') throw new Error('Missing revenue field');
            if (typeof out.leads_generated !== 'number') throw new Error('Missing leads_generated field');
            if (typeof out.conversion_rate !== 'number') throw new Error('Missing conversion_rate field');
            console.log('jobBot: PASSED');
          "

      - name: Run DreamCo Orchestrator (full cycle)
        run: |
          node -e "
            const orch = require('./DreamCo/orchestrator/index');
            const { results, summary } = orch.runAllBots();
            console.log('Summary:', JSON.stringify(summary, null, 2));
            if (summary.bots_run !== 8) throw new Error('Expected 8 bots to run');
            console.log('Orchestrator: PASSED');
          "

      - name: Revenue validation — all bots pass schema
        run: |
          node -e "
            const { validateRevenue } = require('./DreamCo/orchestrator/index');
            const tests = [
              { revenue: 200,   conversion_rate: 0.1,  leads_generated: 5,  bot: 'side_hustle_bot' },
              { revenue: 10000, conversion_rate: 0.1,  leads_generated: 2,  bot: 'real_estate_bot' },
              { revenue: 5000,  conversion_rate: 0.2,  leads_generated: 3,  bot: 'gov_bot' },
              { revenue: 50,    conversion_rate: 0.3,  leads_generated: 10, bot: 'job_bot' },
            ];
            for (const t of tests) {
              const result = validateRevenue(t);
              if (typeof result.scale !== 'boolean') throw new Error('Missing scale field');
              console.log(t.bot + ' → ' + result.message);
            }
            console.log('Revenue validation: PASSED');
          "

      - name: Run Jest tests
        run: npm test --if-present

  # ──────────────────────────────────────────────
  # Job 2: Python — Validate Python orchestrator & bots
  # ──────────────────────────────────────────────
  dreamco-python:
    name: Python Orchestrator & Bots
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke-test — DreamCo Orchestrator import
        run: |
          python -c "
          from core.dreamco_orchestrator import DreamCoOrchestrator, RevenueValidator, AutoScaler
          orch = DreamCoOrchestrator()
          validator = RevenueValidator()
          scaler = AutoScaler()
          print('DreamCoOrchestrator: OK')
          "

      - name: Smoke-test — Revenue Validator logic
        run: |
          python -c "
          from core.dreamco_orchestrator import RevenueValidator

          v = RevenueValidator()

          # Scale case
          r = v.validate({'revenue': 1500, 'conversion_rate': 0.2, 'leads_generated': 5})
          assert r['scale'] is True, 'Expected scale=True for revenue 1500'
          assert r['status'] == 'scale'

          # Maintain case
          r = v.validate({'revenue': 500, 'conversion_rate': 0.1, 'leads_generated': 3})
          assert r['scale'] is False
          assert r['status'] == 'maintain'

          # Underperforming
          r = v.validate({'revenue': 10})
          assert r['status'] == 'underperforming'

          print('Revenue Validator: PASSED')
          "

      - name: Smoke-test — Optimizer
        run: |
          python -c "
          from core.optimizer import Optimizer

          opt = Optimizer()

          assert opt.improve({'revenue': 2000, 'conversion_rate': 0.3, 'leads_generated': 5}) == 'Scale aggressively'
          assert opt.improve({'revenue': 200,  'conversion_rate': 0.15, 'leads_generated': 5}) == 'Maintain'
          assert opt.improve({'revenue': 50,   'conversion_rate': 0.02, 'leads_generated': 5}) == 'Change strategy'
          assert opt.improve({'revenue': 100,  'conversion_rate': 0.1,  'leads_generated': 1}) == 'Expand reach'

          print('Optimizer: PASSED')
          "

      - name: Smoke-test — Scheduler (1 cycle, no sleep)
        run: |
          python -c "
          from core.scheduler import Scheduler
          from core.dreamco_orchestrator import DreamCoOrchestrator

          class MockOrch:
              def run_all_bots(self):
                  return [{'bot': 'test_bot', 'output': {'revenue': 500, 'leads_generated': 3, 'conversion_rate': 0.2}, 'validation': {'scale': False, 'status': 'maintain'}}]
              def summary(self, results):
                  return {'total_revenue': 500, 'total_leads': 3, 'scaling_bots': [], 'failed_bots': [], 'bots_run': 1}

          sched = Scheduler(interval_seconds=0, max_cycles=1, orchestrator=MockOrch())
          sched.run_forever()
          assert sched.cycles_run == 1
          print('Scheduler: PASSED')
          "

      - name: Run DreamCo orchestrator test suite
        run: |
          python -m pytest tests/test_dreamco_orchestrator.py -v --tb=short

      - name: Run full test suite (minus known-failing tests)
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_backend.py \
            --ignore=tests/test_web_dashboard.py \
            -q --tb=short
