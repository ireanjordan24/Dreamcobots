name: DreamCo CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CI: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build DreamCo
        run: npm run build --if-present

      - name: Run tests
        run: npm test --if-present
