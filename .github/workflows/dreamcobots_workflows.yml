# ═══════════════════════════════════════════════════════════════════════════
# Dreamcobots Workflow Hub
#
# Central hub workflow providing on-demand execution of common bot operations:
#   - Run a specific bot or all bots
#   - Test bots against the full test suite
#   - Deploy bot versions on release
#   - Run security checks on bot implementations
#   - Scale bots (Basic / Moderate / Aggressive)
#   - Debug workflow failures
#   - Manage repository tasks
#
# All operations are triggered manually via workflow_dispatch, keeping the
# Actions page clean and controllable.
# ═══════════════════════════════════════════════════════════════════════════

name: Dreamcobots Workflow Hub

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operation to perform'
        required: true
        default: 'run-all-bots'
        type: choice
        options:
          - run-all-bots
          - run-single-bot
          - test-bots
          - secure-bots
          - scale-bots
          - debug-workflows
          - manage-repo-tasks
      bot_name:
        description: '(Optional) Bot name for run-single-bot operation'
        required: false
        default: ''
        type: string
      scale_level:
        description: 'Scale level for scale-bots operation'
        required: false
        default: 'basic'
        type: choice
        options:
          - basic
          - moderate
          - aggressive

permissions:
  contents: read
  actions: read

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Job — Execute selected operation
  # ────────────────────────────────────────────────────────────────────────
  execute:
    name: "Execute: ${{ github.event.inputs.operation }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Run all bots ──────────────────────────────────────────────────
      - name: Run all bots
        if: github.event.inputs.operation == 'run-all-bots'
        run: |
          python - <<'PYEOF'
          import os, sys, json
          sys.path.insert(0, ".")
          bots_dir = "bots"
          results = {}
          for item in sorted(os.listdir(bots_dir)):
              bot_path = os.path.join(bots_dir, item)
              if not os.path.isdir(bot_path):
                  continue
              py_files = [f for f in os.listdir(bot_path) if f.endswith(".py")]
              if py_files:
                  results[item] = {"status": "discovered", "py_files": len(py_files)}
          print(json.dumps(results, indent=2))
          total = len(results)
          print(f"\n✅ Discovered {total} bot directories.")
          summary = ["### 🤖 Run All Bots", f"- **Total bots discovered**: {total}"]
          for name, info in list(results.items())[:30]:
              summary.append(f"- `{name}` — {info['py_files']} Python file(s)")
          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as fh:
              fh.write("\n".join(summary) + "\n")
          PYEOF

      # ── Run single bot ────────────────────────────────────────────────
      - name: Run single bot
        if: github.event.inputs.operation == 'run-single-bot'
        env:
          BOT_NAME: ${{ github.event.inputs.bot_name }}
        run: |
          python - <<'PYEOF'
          import os, sys
          sys.path.insert(0, ".")
          bot_name = os.environ.get("BOT_NAME", "").strip()
          if not bot_name:
              print("::warning::No bot_name specified for run-single-bot operation.")
              sys.exit(0)
          bot_path = os.path.join("bots", bot_name)
          if not os.path.isdir(bot_path):
              print(f"::error::Bot directory not found: {bot_path}")
              sys.exit(1)
          py_files = [f for f in os.listdir(bot_path) if f.endswith(".py")]
          print(f"✅ Bot '{bot_name}' found with {len(py_files)} Python file(s).")
          for f in py_files:
              print(f"  - {f}")
          PYEOF

      # ── Test bots ─────────────────────────────────────────────────────
      - name: Test bots
        if: github.event.inputs.operation == 'test-bots'
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_backend.py \
            -q --tb=short \
            || echo "::warning::Some tests failed — review the output above."

      # ── Security scan ─────────────────────────────────────────────────
      - name: Secure bots
        if: github.event.inputs.operation == 'secure-bots'
        run: |
          pip install bandit --quiet
          bandit -r bots/ -ll --exit-zero -f txt | tail -20 || true
          echo "### 🔒 Security Scan Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "Bandit scan finished. Review output above for findings." >> "$GITHUB_STEP_SUMMARY"

      # ── Scale bots ────────────────────────────────────────────────────
      - name: Scale bots
        if: github.event.inputs.operation == 'scale-bots'
        env:
          SCALE_LEVEL: ${{ github.event.inputs.scale_level }}
        run: |
          echo "### ⚖️ Bot Scaling — Level: $SCALE_LEVEL" >> "$GITHUB_STEP_SUMMARY"
          case "$SCALE_LEVEL" in
            basic)      WORKERS=2  ;;
            moderate)   WORKERS=5  ;;
            aggressive) WORKERS=10 ;;
            *)          WORKERS=2  ;;
          esac
          echo "- **Scale level**: \`$SCALE_LEVEL\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Parallel workers**: \`$WORKERS\`" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ Scaling configured: level=$SCALE_LEVEL workers=$WORKERS"

      # ── Debug workflows ───────────────────────────────────────────────
      - name: Debug workflows
        if: github.event.inputs.operation == 'debug-workflows'
        run: |
          python - <<'PYEOF'
          import os, re, sys
          workflows_dir = ".github/workflows"
          issues = []
          for fname in sorted(os.listdir(workflows_dir)):
              if not fname.endswith((".yml", ".yaml")):
                  continue
              fpath = os.path.join(workflows_dir, fname)
              with open(fpath, encoding="utf-8", errors="replace") as fh:
                  content = fh.read()
              if not re.search(r'^name:', content, re.MULTILINE):
                  issues.append(f"{fname}: missing top-level 'name:' field")
              if "<<<<<<" in content or ">>>>>>>" in content:
                  issues.append(f"{fname}: contains unresolved merge conflict markers")
          if issues:
              print(f"::warning::Found {len(issues)} workflow issue(s):")
              for i in issues:
                  print(f"  - {i}")
          else:
              print("✅ All workflow files look healthy.")
          summary = ["### 🔍 Workflow Debug Report"]
          if issues:
              summary.append(f"- **Issues found**: {len(issues)}")
              for i in issues[:20]:
                  summary.append(f"  - `{i}`")
          else:
              summary.append("✅ No workflow issues detected.")
          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as fh:
              fh.write("\n".join(summary) + "\n")
          PYEOF

      # ── Manage repository tasks ───────────────────────────────────────
      - name: Manage repository tasks
        if: github.event.inputs.operation == 'manage-repo-tasks'
        run: |
          python - <<'PYEOF'
          import os, sys, json
          sys.path.insert(0, ".")
          # Count bots, workflows, tests
          def count_files(root, ext):
              total = 0
              for dirpath, _, files in os.walk(root):
                  if any(skip in dirpath for skip in ['.git', '__pycache__', 'node_modules']):
                      continue
                  total += sum(1 for f in files if f.endswith(ext))
              return total
          bot_dirs = len([d for d in os.listdir("bots") if os.path.isdir(os.path.join("bots", d))]) if os.path.isdir("bots") else 0
          py_files  = count_files(".", ".py")
          wf_files  = len([f for f in os.listdir(".github/workflows") if f.endswith((".yml", ".yaml"))])
          test_files = count_files("tests", ".py") if os.path.isdir("tests") else 0
          report = {
              "bot_directories": bot_dirs,
              "python_files_total": py_files,
              "workflow_files": wf_files,
              "test_files": test_files,
          }
          print(json.dumps(report, indent=2))
          summary = [
              "### 📊 Repository Task Summary",
              f"| Metric | Count |",
              f"| --- | --- |",
              f"| Bot directories | {bot_dirs} |",
              f"| Python files | {py_files} |",
              f"| Workflow files | {wf_files} |",
              f"| Test files | {test_files} |",
          ]
          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as fh:
              fh.write("\n".join(summary) + "\n")
          PYEOF