name: Daily Health Monitor

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch:

jobs:
  health_monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Test Coverage
        run: |
          # Add the command to check test coverage
          echo "Checking test coverage..."
          # Example command (replace with your actual command)
          npm run test -- --coverage

      - name: Branch Activity
        run: |
          # Command to gather branch activity
          echo "Gathering branch activity..."
          git fetch --all
          git log --oneline --since='1 day ago' | wc -l

      - name: Formatting Check
        run: |
          # Command to check code formatting
          echo "Checking for formatting errors..."
          # Example command (replace with your actual command)
          npx eslint . --fix --quiet
