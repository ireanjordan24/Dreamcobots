# Workflow for GitHub Automation
# Runs on every PR and push. Installs dependencies, runs tests, builds,
# performs self-healing diagnostics, and (on push to main only) deploys.

name: CI Automation Workflows

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Run Tests
        run: npm test --if-present

      - name: Build Project
        run: npm run build --if-present

      - name: AI Debugging and Self-Healing
        run: |
          if npm run diagnose --if-present; then
            echo 'No issues detected.';
          else
            npm run apply-fix --if-present;
            echo 'Auto-healing applied.';
          fi

      - name: Deploy (main branch only)
        if: success() && github.ref == 'refs/heads/main'
        run: npm run deploy --if-present
