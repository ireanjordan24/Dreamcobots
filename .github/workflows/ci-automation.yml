# Workflow for GitHub Automation

name: CI Automation Workflows

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Run Tests
        run: npm test

      - name: Build Project
        run: npm run build

      - name: AI Debugging and Self-Healing
        run: |
          if npm run diagnose; then
            echo 'No issues detected.';
          else
            npm run apply-fix && echo 'Auto-healing applied.' || echo 'Auto-healing attempted.';
          fi

      - name: Deploy (main branch only)
        if: success() && github.ref == 'refs/heads/main'
        run: npm run deploy --if-present

