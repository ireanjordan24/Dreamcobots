# Workflow for GitHub Automation

name: CI Automation Workflows

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Read Node.js version from .nvmrc
        id: nvmrc
        run: echo "node_version=$(cat .nvmrc | xargs)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.node_version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Build Project
        run: npm run build

      - name: AI Debugging and Self-Healing
        run: |
          if npm run diagnose; then
            echo 'No issues detected.';
          else
            npm run apply-fix;
            echo 'Auto-healing applied.';
          fi

      - name: Redeploy on Successful Resolution
        run: npm run deploy
        if: success()
