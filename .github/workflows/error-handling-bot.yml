name: Error Handling Bot — Sandbox & Health Check

# Runs:
#   • On every push / PR targeting main (smoke test)
#   • On a daily schedule (keeps the system healthy after merges)
#   • On manual trigger (workflow_dispatch) so anyone can kick it off

on:
  push:
    branches:
      - main
    paths:
      - "bots/error_handling_bot/**"
      - "tests/test_error_handling_bot.py"
      - ".github/workflows/error-handling-bot.yml"
  pull_request:
    branches:
      - main
    paths:
      - "bots/error_handling_bot/**"
      - "tests/test_error_handling_bot.py"
      - ".github/workflows/error-handling-bot.yml"
  schedule:
    - cron: "0 6 * * *"   # Daily at 06:00 UTC — post-merge health check
  workflow_dispatch:
    inputs:
      learning_mode:
        description: "Run sandbox simulation with Learning Mode (yes/no)"
        required: false
        default: "yes"

jobs:
  # -----------------------------------------------------------------------
  # 1. Unit tests for the Error Handling Bot
  # -----------------------------------------------------------------------
  test-error-handling-bot:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Error Handling Bot tests
        run: |
          python -m pytest tests/test_error_handling_bot.py \
            -v --tb=short \
            --no-header \
            -q

  # -----------------------------------------------------------------------
  # 2. Sandbox simulation — exercises every error category end-to-end
  # -----------------------------------------------------------------------
  sandbox-simulation:
    name: 🤖 Sandbox Simulation
    runs-on: ubuntu-latest
    needs: test-error-handling-bot
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sandbox simulation (Learning Mode on)
        run: |
          echo "🔎  Running DreamCo Error Handling Bot Sandbox Simulation..."
          LEARNING_FLAG=""
          if [ "${{ github.event.inputs.learning_mode }}" = "no" ]; then
            LEARNING_FLAG="--no-learning"
          fi
          python bots/error_handling_bot/sandbox_simulation.py $LEARNING_FLAG
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Verify simulation produced logs
        run: |
          if [ -f /tmp/error-bot-demo/errors.log ]; then
            echo "✅  Simulation logs found:"
            cat /tmp/error-bot-demo/errors.log
          else
            echo "ℹ️  No log file produced (log_dir is /tmp, not persisted in workspace)."
          fi

  # -----------------------------------------------------------------------
  # 3. Post-merge health check — runs full test suite after merge to main
  # -----------------------------------------------------------------------
  post-merge-health-check:
    name: 🏥 Post-Merge Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: sandbox-simulation
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full bot test suite (excluding heavy backend tests)
        run: |
          echo "🏃  Running full test suite post-merge..."
          python -m pytest tests/ \
            --ignore=tests/test_backend.py \
            --ignore=tests/test_web_dashboard.py \
            -q --tb=short
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_PRO: ${{ secrets.STRIPE_PRICE_PRO }}
          STRIPE_PRICE_ENTERPRISE: ${{ secrets.STRIPE_PRICE_ENTERPRISE }}

      - name: Print health summary
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "  DreamCo Error Handling Bot — Health ✅ "
          echo "  Commit: ${{ github.sha }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Triggered by: ${{ github.actor }}"
          echo "=========================================="
