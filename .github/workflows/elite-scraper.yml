name: Elite Scraper Bots

# -----------------------------------------------------------------------
# Elite Scraper Bot Workflow
#
# Runs dedicated Elite Scraper Bots for every DreamCo bot in the
# repository.  Each bot's scraper team autonomously searches GitHub
# repositories, online knowledge sources, and monetisation channels to
# make each parent bot smarter, more profitable, and better at acquiring
# clients.
#
# Triggers
# --------
#  • Scheduled: every 6 hours (continuous learning)
#  • Manual (workflow_dispatch): run on-demand with optional bot filter
# -----------------------------------------------------------------------

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:
    inputs:
      bots:
        description: >
          Space-separated list of bot names to scrape, or "all" for every
          registered bot (default: all).
        required: false
        default: 'all'
      max_results:
        description: 'Maximum results per query per bot (default: 10)'
        required: false
        default: '10'

jobs:
  elite-scraper:
    name: Run Elite Scraper Bots
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit knowledge-store updates back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Elite Scraper Bots
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python bots/elite_scraper/run_elite_scrapers.py \
            --bots ${{ github.event.inputs.bots || 'all' }} \
            --max-results ${{ github.event.inputs.max_results || '10' }}

      - name: Commit knowledge-store updates
        if: always()
        run: |
          git config user.name  "elite-scraper-bot[bot]"
          git config user.email "elite-scraper-bot@dreamco.ai"
          git add data/elite_scraper/ || true
          if git diff --cached --quiet; then
            echo "No new knowledge to commit."
          else
            git commit -m "chore(elite-scraper): update knowledge store [skip ci]"
            git push
          fi

      - name: Upload knowledge artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elite-scraper-knowledge
          path: data/elite_scraper/
          if-no-files-found: ignore
