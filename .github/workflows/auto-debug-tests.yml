# Auto-Debug Failed Tests Workflow
#
# Automatically detects failures across pull requests and CI runs, collects
# debug information, retries failed tests, and applies automated fixes where
# possible.
#
# Supported auto-fix scenarios
# ─────────────────────────────
#   • Python  (python_bots/) — black auto-format + flake8 lint
#   • Java    (java_bots/)   — google-java-format auto-format + Checkstyle
#   • JS / TS                — Prettier --write + ESLint --fix
#
# Debug pipeline steps
# ────────────────────
#   1. Collect environment & tool versions.
#   2. Run tests / lint checks (up to 3 retry attempts).
#   3. On failure apply an automated fix then retry.
#   4. On unrecoverable failure emit a GitHub annotation and fail loudly.
#   5. All actions are logged for traceability.

name: Auto-Debug Failed Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  MAX_RETRY_ATTEMPTS: 3

jobs:
  # ── Collect system debug info ─────────────────────────────────────────────
  debug-environment:
    name: Collect Debug Environment Info
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Collect system & tool versions
        run: |
          echo "::group::System information"
          echo "Runner OS:       $RUNNER_OS"
          echo "Runner arch:     $RUNNER_ARCH"
          echo "GitHub event:    ${{ github.event_name }}"
          echo "Branch/ref:      ${{ github.ref }}"
          echo "Commit SHA:      ${{ github.sha }}"
          uname -a
          echo "::endgroup::"

          echo "::group::Python toolchain"
          python --version
          pip --version
          pip install black flake8 --quiet
          black --version
          flake8 --version
          echo "::endgroup::"

          echo "::group::Node.js toolchain"
          node --version
          npm --version
          npx prettier --version 2>/dev/null || echo "prettier: not installed"
          npx eslint --version  2>/dev/null || echo "eslint:   not installed"
          echo "::endgroup::"

          echo "::group::Repository layout"
          ls -la
          echo "--- python_bots/ ---"
          find python_bots -name "*.py" 2>/dev/null | head -20 || echo "(not found)"
          echo "--- java_bots/ ---"
          find java_bots   -name "*.java" 2>/dev/null | head -20 || echo "(not found)"
          echo "::endgroup::"

  # ── Python: pytest with retry + black/flake8 auto-fix ────────────────────
  debug-python-tests:
    name: Python Tests (debug + retry)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: debug-environment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Lint / format with retry + auto-fix ───────────────────────────────
      - name: Python lint & format (black + flake8, with auto-fix retry)
        id: python_lint
        run: |
          pip install black flake8

          if ! ( [ -d python_bots ] && find python_bots -name "*.py" | grep -q . ); then
            echo "No Python files in python_bots/ — skipping lint."
            exit 0
          fi

          LINT_PASSED=false
          for attempt in $(seq 1 ${{ env.MAX_RETRY_ATTEMPTS }}); do
            echo "::group::Lint attempt $attempt / ${{ env.MAX_RETRY_ATTEMPTS }}"
            FLAKE_OK=true
            BLACK_OK=true

            flake8 python_bots/ --max-line-length=120 --ignore=W503 --statistics 2>&1 \
              || FLAKE_OK=false

            black --check --diff python_bots/ 2>&1 \
              || BLACK_OK=false

            if $FLAKE_OK && $BLACK_OK; then
              echo "✅ Python lint passed on attempt $attempt"
              LINT_PASSED=true
              echo "::endgroup::"
              break
            fi

            echo "::endgroup::"

            if [ "$attempt" -lt "${{ env.MAX_RETRY_ATTEMPTS }}" ]; then
              echo "🔧 Auto-fix: running black on python_bots/ ..."
              black --quiet python_bots/
            fi
          done

          if ! $LINT_PASSED; then
            echo "::error file=python_bots::Python lint/format failed after ${{ env.MAX_RETRY_ATTEMPTS }} attempts."
            echo "  Run locally: black python_bots/ && flake8 python_bots/ --max-line-length=120 --ignore=W503"
            exit 1
          fi

      # ── pytest with retry ─────────────────────────────────────────────────
      - name: pytest (with retry)
        run: |
          TESTS_PASSED=false
          for attempt in $(seq 1 ${{ env.MAX_RETRY_ATTEMPTS }}); do
            echo "::group::pytest attempt $attempt / ${{ env.MAX_RETRY_ATTEMPTS }}"

            if python -m pytest tests/ \
                --ignore=tests/test_backend.py \
                --ignore=tests/test_web_dashboard.py \
                -q --tb=short 2>&1; then
              echo "✅ Tests passed on attempt $attempt"
              TESTS_PASSED=true
              echo "::endgroup::"
              break
            fi

            echo "::endgroup::"

            if [ "$attempt" -lt "${{ env.MAX_RETRY_ATTEMPTS }}" ]; then
              echo "⏳ Tests failed on attempt $attempt — retrying in 5 seconds ..."
              sleep 5
            fi
          done

          if ! $TESTS_PASSED; then
            echo "::error::Python tests failed after ${{ env.MAX_RETRY_ATTEMPTS }} attempts."
            echo "  Check the test output above for details."
            exit 1
          fi

      # ── Commit any auto-applied black fixes ───────────────────────────────
      - name: Commit black formatting fixes
        if: always()
        run: |
          git config --global user.name "dreamco-bot"
          git config --global user.email "bot@dreamco.ai"
          git add python_bots/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No black formatting changes to commit."
          else
            git commit -m "🤖 Auto-debug: black formatting applied to python_bots/"
            git push || echo "⚠️  Push failed — check GH_TOKEN permissions"
          fi

  # ── Java: Checkstyle + google-java-format with retry + auto-fix ──────────
  debug-java-lint:
    name: Java Lint & Format (debug + retry)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: debug-environment

    env:
      GJF_VERSION: '1.22.0'
      CHECKSTYLE_VERSION: '10.21.0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Check for Java files
        id: java_check
        run: |
          if [ -d java_bots ] && find java_bots -name "*.java" | grep -q .; then
            echo "has_java=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_java=false" >> "$GITHUB_OUTPUT"
            echo "No Java files found in java_bots/ — skipping Java lint job."
          fi

      - name: Set up Java
        if: steps.java_check.outputs.has_java == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache google-java-format JAR
        if: steps.java_check.outputs.has_java == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/gjf
          key: gjf-${{ env.GJF_VERSION }}

      - name: Download google-java-format JAR
        if: steps.java_check.outputs.has_java == 'true'
        run: |
          mkdir -p ~/.cache/gjf
          JAR=~/.cache/gjf/google-java-format-${{ env.GJF_VERSION }}-all-deps.jar
          if [ ! -f "$JAR" ]; then
            curl -sSL \
              "https://github.com/google/google-java-format/releases/download/v${{ env.GJF_VERSION }}/google-java-format-${{ env.GJF_VERSION }}-all-deps.jar" \
              -o "$JAR"
          fi

      - name: Cache Checkstyle JAR
        if: steps.java_check.outputs.has_java == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/checkstyle
          key: checkstyle-${{ env.CHECKSTYLE_VERSION }}

      - name: Download Checkstyle JAR
        if: steps.java_check.outputs.has_java == 'true'
        run: |
          mkdir -p ~/.cache/checkstyle
          JAR=~/.cache/checkstyle/checkstyle-${{ env.CHECKSTYLE_VERSION }}-all.jar
          if [ ! -f "$JAR" ]; then
            curl -sSL \
              "https://github.com/checkstyle/checkstyle/releases/download/checkstyle-${{ env.CHECKSTYLE_VERSION }}/checkstyle-${{ env.CHECKSTYLE_VERSION }}-all.jar" \
              -o "$JAR"
          fi

      # ── Checkstyle + google-java-format with retry + auto-fix ─────────────
      - name: Java lint & format (with auto-fix retry)
        if: steps.java_check.outputs.has_java == 'true'
        run: |
          GJF_JAR=~/.cache/gjf/google-java-format-${{ env.GJF_VERSION }}-all-deps.jar
          CS_JAR=~/.cache/checkstyle/checkstyle-${{ env.CHECKSTYLE_VERSION }}-all.jar
          JAVA_FILES=$(find java_bots -name "*.java")

          LINT_PASSED=false
          for attempt in $(seq 1 ${{ env.MAX_RETRY_ATTEMPTS }}); do
            echo "::group::Java lint attempt $attempt / ${{ env.MAX_RETRY_ATTEMPTS }}"
            CS_OK=true
            GJF_OK=true

            if [ -f checkstyle.xml ]; then
              # shellcheck disable=SC2086
              java -jar "$CS_JAR" -c checkstyle.xml $JAVA_FILES 2>&1 || CS_OK=false
            fi

            # shellcheck disable=SC2086
            java -jar "$GJF_JAR" --dry-run --set-exit-if-changed $JAVA_FILES 2>&1 \
              || GJF_OK=false

            if $CS_OK && $GJF_OK; then
              echo "✅ Java lint passed on attempt $attempt"
              LINT_PASSED=true
              echo "::endgroup::"
              break
            fi

            echo "::endgroup::"

            if [ "$attempt" -lt "${{ env.MAX_RETRY_ATTEMPTS }}" ]; then
              echo "🔧 Auto-fix: running google-java-format --replace ..."
              # shellcheck disable=SC2086
              java -jar "$GJF_JAR" --replace $JAVA_FILES
            fi
          done

          if ! $LINT_PASSED; then
            echo "::error file=java_bots::Java lint/format failed after ${{ env.MAX_RETRY_ATTEMPTS }} attempts."
            echo "  Run locally: java -jar ~/.cache/gjf/google-java-format-${{ env.GJF_VERSION }}-all-deps.jar --replace \$(find java_bots -name '*.java')"
            exit 1
          fi

      # ── Commit any auto-applied google-java-format fixes ──────────────────
      - name: Commit google-java-format fixes
        if: always() && steps.java_check.outputs.has_java == 'true'
        run: |
          git config --global user.name "dreamco-bot"
          git config --global user.email "bot@dreamco.ai"
          git add java_bots/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No google-java-format changes to commit."
          else
            git commit -m "🤖 Auto-debug: google-java-format applied to java_bots/"
            git push || echo "⚠️  Push failed — check GH_TOKEN permissions"
          fi

  # ── JS/TS: ESLint + Prettier with retry + auto-fix ───────────────────────
  debug-js-lint:
    name: JS/TS Lint & Format (debug + retry)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: debug-environment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # ── ESLint + Prettier with retry + auto-fix ───────────────────────────
      - name: JS/TS lint & format (with auto-fix retry)
        run: |
          LINT_PASSED=false
          for attempt in $(seq 1 ${{ env.MAX_RETRY_ATTEMPTS }}); do
            echo "::group::JS/TS lint attempt $attempt / ${{ env.MAX_RETRY_ATTEMPTS }}"
            ESLINT_OK=true
            PRETTIER_OK=true

            npm run lint -- --ext .js,.ts,.jsx,.tsx 2>&1 || ESLINT_OK=false

            npx prettier --check \
              --ignore-path .prettierignore \
              "**/*.{js,ts,jsx,tsx}" 2>&1 || PRETTIER_OK=false

            if $ESLINT_OK && $PRETTIER_OK; then
              echo "✅ JS/TS lint passed on attempt $attempt"
              LINT_PASSED=true
              echo "::endgroup::"
              break
            fi

            echo "::endgroup::"

            if [ "$attempt" -lt "${{ env.MAX_RETRY_ATTEMPTS }}" ]; then
              echo "🔧 Auto-fix: running eslint --fix and prettier --write ..."
              npm run lint -- --fix --ext .js,.ts,.jsx,.tsx 2>&1 || true
              npx prettier --write \
                --ignore-path .prettierignore \
                "**/*.{js,ts,jsx,tsx}" 2>&1 || true
            fi
          done

          if ! $LINT_PASSED; then
            echo "::error::JS/TS lint/format failed after ${{ env.MAX_RETRY_ATTEMPTS }} attempts."
            echo "  Run locally: npm run lint -- --fix && npx prettier --write '**/*.{js,ts,jsx,tsx}'"
            exit 1
          fi

      # ── Commit any auto-applied Prettier/ESLint fixes ─────────────────────
      - name: Commit Prettier + ESLint fixes
        if: always()
        run: |
          git config --global user.name "dreamco-bot"
          git config --global user.email "bot@dreamco.ai"
          git add --all "*.js" "*.ts" "*.jsx" "*.tsx" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No Prettier/ESLint changes to commit."
          else
            git commit -m "🤖 Auto-debug: Prettier + ESLint formatting applied"
            git push || echo "⚠️  Push failed — check GH_TOKEN permissions"
          fi

  # ── Final summary: annotate on any failure ────────────────────────────────
  debug-summary:
    name: Debug Summary
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - debug-python-tests
      - debug-java-lint
      - debug-js-lint
    if: always()

    steps:
      - name: Report overall status
        run: |
          PYTHON_RESULT="${{ needs.debug-python-tests.result }}"
          JAVA_RESULT="${{ needs.debug-java-lint.result }}"
          JS_RESULT="${{ needs.debug-js-lint.result }}"

          echo "::group::Auto-Debug Summary"
          echo "Python tests/lint : $PYTHON_RESULT"
          echo "Java lint         : $JAVA_RESULT"
          echo "JS/TS lint        : $JS_RESULT"
          echo "::endgroup::"

          FAILED=false
          [ "$PYTHON_RESULT" = "failure" ] && {
            echo "::error::Python tests/lint could not be automatically fixed. Manual review required."
            FAILED=true
          }
          [ "$JAVA_RESULT" = "failure" ] && {
            echo "::error::Java lint/format could not be automatically fixed. Manual review required."
            FAILED=true
          }
          [ "$JS_RESULT" = "failure" ] && {
            echo "::error::JS/TS lint/format could not be automatically fixed. Manual review required."
            FAILED=true
          }

          if $FAILED; then
            echo "🚨 One or more checks failed after auto-fix retries. See annotations above."
            exit 1
          else
            echo "✅ All checks passed (possibly after auto-fix). No manual intervention required."
          fi
