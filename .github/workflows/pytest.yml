name: Python Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Enable tmate SSH debug session (on failure)'
        required: false
        default: 'false'
        type: boolean
      verbose:
        description: 'Enable verbose output (long tracebacks, stdout capture off)'
        required: false
        default: 'false'
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'  # Specify the version of Python to use

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check bot framework compliance
      run: python tools/check_bot_framework.py

    - name: Run tests
      run: |
        if [ "${{ inputs.verbose }}" = "true" ]; then
          python -m pytest tests/ \
            --ignore=tests/test_backend.py \
            --ignore=tests/test_web_dashboard.py \
            -v --tb=long -s
        else
          python -m pytest tests/ \
            --ignore=tests/test_backend.py \
            --ignore=tests/test_web_dashboard.py \
            -q --tb=short
        fi

    - name: Debug with tmate (on failure)
      if: failure() && inputs.debug_enabled == 'true'
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: true
