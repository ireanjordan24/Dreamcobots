name: Python Tests

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'  # Specify the version of Python to use

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check bot framework compliance
      run: python tools/check_bot_framework.py

    - name: Run tests
      run: |
        python -m pytest tests/ \
          --ignore=tests/test_backend.py \
          --ignore=tests/test_web_dashboard.py \
          -q --tb=short
