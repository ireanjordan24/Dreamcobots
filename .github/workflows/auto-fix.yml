# Auto-fix Workflow

name: Auto Fix

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Enable tmate SSH debug session (on failure)'
        required: false
        default: 'false'
        type: boolean
      verbose:
        description: 'Enable verbose output (long tracebacks, stdout capture off)'
        required: false
        default: 'false'
        type: boolean

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Check code style (ESLint)
        run: npm run lint
        continue-on-error: true

      - name: Check formatting (Prettier)
        run: npm run format
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot framework compliance check
        run: python tools/check_bot_framework.py
        continue-on-error: true

      - name: Run Python tests
        run: |
          if [ "${{ inputs.verbose }}" = "true" ]; then
            python -m pytest tests/ \
              --ignore=tests/test_backend.py \
              --ignore=tests/test_web_dashboard.py \
              -v --tb=long -s
          else
            python -m pytest tests/ \
              --ignore=tests/test_backend.py \
              --ignore=tests/test_web_dashboard.py \
              -q --tb=short
          fi
        continue-on-error: true

      - name: Debug with tmate (on failure)
        if: failure() && inputs.debug_enabled == 'true'
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
