name: DreamCo Repo Scanner

# Run the scanner on every push and pull-request so developers get immediate
# feedback about missing files, broken imports, and workflow issues.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  repo-scanner:
    name: Repo Scanner — integrity check
    runs-on: ubuntu-latest
    # The scanner is informational — it MUST run even when other jobs fail.
    # Individual steps use continue-on-error so a failure in one scan phase
    # never silences the rest of the report.
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        # Install what we can; ignore failures so the scanner still runs
        # even when requirements.txt contains packages with broken wheels.
        run: |
          python -m pip install --upgrade pip
          [ -f requirements.txt ] && pip install -r requirements.txt || true

      - name: Run DreamCo Repo Scanner
        # Always run and write report to a file so it can be uploaded
        # as a workflow artifact for easy review.
        run: |
          python tools/repo_scanner.py \
            --output scan-report.txt
        continue-on-error: true

      - name: Print report to workflow log
        if: always()
        run: cat scan-report.txt || echo "scan-report.txt not found"

      - name: Upload scan report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dreamco-scan-report
          path: scan-report.txt
          retention-days: 30

      # ------------------------------------------------------------------
      # Bonus: quick inline checks that were requested in the issue
      # ------------------------------------------------------------------

      - name: List empty files
        if: always()
        run: |
          echo "==== EMPTY FILES ===="
          find . -type f -empty \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -not -path './__pycache__/*' || true
        continue-on-error: true

      - name: List repository file structure
        if: always()
        run: |
          echo "==== REPO FILE STRUCTURE ===="
          find . -not -path './.git/*' \
                 -not -path './node_modules/*' \
                 -not -path './__pycache__/*' \
            | sort | head -300
        continue-on-error: true

      - name: Check workflow run commands for missing scripts
        if: always()
        run: |
          echo "==== WORKFLOW RUN COMMANDS ===="
          grep -rn "run:" .github/workflows/ || true
        continue-on-error: true
