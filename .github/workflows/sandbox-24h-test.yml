# DreamCo — 24-Hour Sandbox Test
#
# Triggers automatically when a pull request is merged into main.
# Runs a challenging sandbox test pipeline for all bots in the repository,
# evaluates them with the PerformanceRatingSystem, and uploads the
# resulting report as a workflow artifact.
#
# The "24-hour" gate is enforced by the `sandbox-gate` job which waits
# 24 hours before declaring the sandbox stable.  All other jobs run
# concurrently and must pass before the gate is released.

name: 24-Hour Sandbox Test

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      test_duration_hours:
        description: "Override test duration in hours (default: 24)"
        required: false
        default: "24"

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Job 1: Discover & Validate — fast sanity-check for every bot module
  # ─────────────────────────────────────────────────────────────────────
  discover-bots:
    name: Discover Bots
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      bot_count: ${{ steps.discover.outputs.bot_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Discover all bot classes
        id: discover
        run: |
          python - <<'EOF'
          import sys, os
          sys.path.insert(0, os.getcwd())
          from bots.sandbox_builder_bot.sandbox_builder_bot import SandboxBuilderBot
          bot = SandboxBuilderBot()
          bot.start()
          result = bot.execute_task({"action": "discover"})
          bot.stop()
          discovered = result.get("discovered", [])
          print(f"Discovered {len(discovered)} bot class(es):")
          for name in discovered:
              print(f"  - {name}")
          # Write to GitHub output
          with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as fh:
              fh.write(f"bot_count={len(discovered)}\n")
          EOF

  # ─────────────────────────────────────────────────────────────────────
  # Job 2: Run the full sandbox test suite against all bots
  # ─────────────────────────────────────────────────────────────────────
  sandbox-test:
    name: Sandbox Test Suite
    runs-on: ubuntu-latest
    needs: discover-bots
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sandbox builder bot
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          python - <<'EOF'
          import sys, os
          sys.path.insert(0, os.getcwd())
          from bots.sandbox_builder_bot.sandbox_builder_bot import SandboxBuilderBot

          duration = float(os.environ.get("TEST_DURATION_HOURS", "24"))
          bot = SandboxBuilderBot(
              iterations=100,
              test_duration_hours=duration,
              report_dir="logs/sandbox_reports",
          )
          bot.start()
          summary = bot.build_and_test()
          bot.stop()
          print("Pipeline summary:", summary)
          EOF

      - name: Run pytest — sandbox and rating unit tests
        run: |
          python -m pytest tests/test_sandbox_builder_bot.py -v --tb=short

      - name: Upload sandbox report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sandbox-reports-${{ github.run_id }}
          path: logs/sandbox_reports/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # Job 3: Full pytest suite — regression guard
  # ─────────────────────────────────────────────────────────────────────
  regression-tests:
    name: Regression Test Suite
    runs-on: ubuntu-latest
    needs: discover-bots
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full pytest suite
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_PRO: ${{ secrets.STRIPE_PRICE_PRO }}
          STRIPE_PRICE_ENTERPRISE: ${{ secrets.STRIPE_PRICE_ENTERPRISE }}
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_backend.py \
            --ignore=tests/test_web_dashboard.py \
            -q --tb=short

  # ─────────────────────────────────────────────────────────────────────
  # Job 4: 24-hour gate — waits before marking the sandbox as complete
  #         Ensures the bot has been under observation for a full day
  # ─────────────────────────────────────────────────────────────────────
  sandbox-gate:
    name: 24-Hour Stability Gate
    runs-on: ubuntu-latest
    needs:
      - sandbox-test
      - regression-tests
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait 24 hours in sandbox observation window
        # In workflow_dispatch runs with a custom override, respect that value.
        # In automatic post-merge runs, always enforce the full 24 hours.
        run: |
          HOURS="${{ github.event.inputs.test_duration_hours || '24' }}"
          SECONDS_TO_WAIT=$(python3 -c "print(int(float('${HOURS}') * 3600))")
          echo "Sandbox observation window: ${HOURS} hours (${SECONDS_TO_WAIT}s)"
          sleep "${SECONDS_TO_WAIT}"

      - name: Sandbox observation complete
        run: |
          echo "✅ All bots passed the 24-hour sandbox observation window."
          echo "   The build is stable and ready for production."
