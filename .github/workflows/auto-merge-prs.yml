# ═══════════════════════════════════════════════════════════════════════════
# DreamCo Autonomous PR Manager
#
# Runs hourly (and on demand) to:
#   1. Inspect every open, non-draft pull request.
#   2. Skip PRs that have merge conflicts or failing/pending CI checks.
#   3. Auto-approve and squash-merge qualifying PRs in batches of up to 30.
#   4. Delete the source branch after a successful merge (same-repo branches only).
#   5. Post a job-summary table and emit warnings / step annotations on failures.
#
# Required secret (optional but recommended for write operations on protected
# branches):  GH_TOKEN  — a Personal Access Token with repo + workflow scope.
# Falls back to the built-in GITHUB_TOKEN when GH_TOKEN is absent.
# ═══════════════════════════════════════════════════════════════════════════

name: Autonomous PR Manager

on:
  schedule:
    - cron: '0 * * * *'   # Every hour, on the hour
  workflow_dispatch:
    inputs:
      dry_run:
        description: >
          Dry-run mode — evaluate PRs and log what would be merged,
          but do NOT perform any actual merge or branch deletion.
        required: false
        default: 'false'
        type: boolean
      batch_size:
        description: 'Maximum number of PRs to process in this run (1–30)'
        required: false
        default: '30'
        type: string

permissions:
  contents: write        # push merge commits, delete branches
  pull-requests: write   # merge PRs, post review approvals
  checks: read           # read check-run results
  statuses: read         # read commit status contexts
  actions: read          # read workflow-run results

jobs:
  auto-merge-prs:
    name: "🤖 Auto-Merge Ready Pull Requests"
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

    steps:
      # ─────────────────────────────────────────────────────────────────
      # 1. Checkout (gives the runner git credentials for any git ops)
      # ─────────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ─────────────────────────────────────────────────────────────────
      # 2. Core PR-management logic (JavaScript via actions/github-script)
      # ─────────────────────────────────────────────────────────────────
      - name: Process and merge ready pull requests
        id: merge
        uses: actions/github-script@v7
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '30' }}
        with:
          github-token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const DRY_RUN    = process.env.DRY_RUN === 'true';
            const BATCH_SIZE = Math.min(Math.max(parseInt(process.env.BATCH_SIZE) || 30, 1), 30);
            const owner      = context.repo.owner;
            const repo       = context.repo.repo;

            core.info('');
            core.info('╔══════════════════════════════════════════════════╗');
            core.info('║   DreamCo Autonomous PR Manager                  ║');
            core.info('╚══════════════════════════════════════════════════╝');
            core.info(`Mode       : ${DRY_RUN ? '🔍 DRY RUN (no merges)' : '🚀 LIVE'}`);
            core.info(`Batch size : ${BATCH_SIZE}`);
            core.info(`Repository : ${owner}/${repo}`);
            core.info('');

            // ── Helpers ───────────────────────────────────────────────

            /** Promise-based sleep. */
            const sleep = ms => new Promise(r => setTimeout(r, ms));

            /**
             * Fetch ALL open, non-draft PRs (handles GitHub pagination).
             * Oldest PRs (lowest number) are returned first so they get
             * priority in each batch.
             */
            async function getAllOpenPRs() {
              const prs  = [];
              let   page = 1;
              while (true) {
                const { data } = await github.rest.pulls.list({
                  owner, repo,
                  state:    'open',
                  sort:     'created',
                  direction:'asc',
                  per_page: 100,
                  page,
                });
                prs.push(...data.filter(pr => !pr.draft));
                if (data.length < 100) break;
                page++;
              }
              return prs;
            }

            /**
             * Return { passed, reason } after inspecting check-runs and
             * commit-status contexts for the given commit SHA.
             */
            async function ciStatus(headSha) {
              // — Check Runs (GitHub Actions, external CI) ——————————————
              const { data: { check_runs } } = await github.rest.checks.listForRef({
                owner, repo,
                ref:      headSha,
                per_page: 100,
              });

              for (const run of check_runs) {
                if (run.status !== 'completed') {
                  return { passed: false, reason: `Check "${run.name}" still in progress` };
                }
                if (!['success', 'neutral', 'skipped'].includes(run.conclusion)) {
                  return { passed: false, reason: `Check "${run.name}" concluded: ${run.conclusion}` };
                }
              }

              // — Commit Status Contexts (legacy status API) ————————————
              const { data: combined } = await github.rest.repos.getCombinedStatusForRef({
                owner, repo,
                ref: headSha,
              });
              if (['failure', 'error'].includes(combined.state)) {
                return { passed: false, reason: `Commit status: "${combined.state}"` };
              }

              return { passed: true, reason: 'All CI checks passed' };
            }

            /**
             * Return { mergeable, mergeableState, reason }.
             * GitHub computes mergeability lazily; poll up to 3 times with
             * a 3-second back-off before giving up.
             */
            async function mergeability(prNumber) {
              let pr;
              for (let attempt = 1; attempt <= 3; attempt++) {
                const { data } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
                pr = data;
                if (pr.mergeable !== null) break;
                core.debug(`  PR #${prNumber}: mergeability null (attempt ${attempt}/3)`);
                await sleep(3000);
              }

              if (pr.mergeable === false) {
                return { mergeable: false, mergeableState: pr.mergeable_state, reason: 'Has merge conflicts' };
              }
              if (pr.mergeable === null) {
                return { mergeable: false, mergeableState: 'unknown', reason: 'Could not determine mergeability' };
              }
              return { mergeable: true, mergeableState: pr.mergeable_state, reason: 'No conflicts' };
            }

            /**
             * Attempt to approve the PR so that merge can proceed even on
             * branches that require an approving review.
             * Approval failures are non-fatal — we log and continue.
             */
            async function approvePR(prNumber) {
              try {
                await github.rest.pulls.createReview({
                  owner, repo,
                  pull_number: prNumber,
                  event: 'APPROVE',
                  body: '🤖 Auto-approved by DreamCo Autonomous PR Manager — all CI checks passed and no conflicts detected.',
                });
                core.info(`  ✅ Approved PR #${prNumber}`);
              } catch (err) {
                // Common reason: the bot cannot approve its own PR, or
                // branch protection does not require approval.
                core.warning(`  ⚠️  Could not approve PR #${prNumber}: ${err.message}`);
              }
            }

            // ── Main loop ─────────────────────────────────────────────

            const summary = {
              total:   0,
              merged:  [],
              skipped: [],
              failed:  [],
            };

            const allPRs     = await getAllOpenPRs();
            summary.total    = allPRs.length;

            core.info(`📋 Found ${allPRs.length} open non-draft PR(s)`);

            if (allPRs.length === 0) {
              core.info('✅ Repository is clean — no open PRs to process.');
              core.setOutput('merged_count',  '0');
              core.setOutput('skipped_count', '0');
              core.setOutput('failed_count',  '0');
              return;
            }

            // Process the first BATCH_SIZE PRs in this run.
            // Remaining PRs will be handled by the next scheduled run.
            const batch = allPRs.slice(0, BATCH_SIZE);
            core.info(`⚙️  Processing batch of ${batch.length} PR(s) (batch_size=${BATCH_SIZE})`);

            for (let idx = 0; idx < batch.length; idx++) {
              const pr = batch[idx];
              core.info('');
              core.info(`── [${idx + 1}/${batch.length}] PR #${pr.number}: ${pr.title}`);
              core.info(`   Branch : ${pr.head.ref} → ${pr.base.ref}`);
              core.info(`   Author : ${pr.user.login}`);

              // ① Conflict / mergeability check
              const { mergeable, reason: conflictReason } = await mergeability(pr.number);
              if (!mergeable) {
                core.warning(`   ⏭️  Skipping — ${conflictReason}`);
                summary.skipped.push({ number: pr.number, title: pr.title, reason: conflictReason });
                continue;
              }

              // ② CI / checks gate
              const { passed, reason: ciReason } = await ciStatus(pr.head.sha);
              if (!passed) {
                core.warning(`   ⏭️  Skipping — ${ciReason}`);
                summary.skipped.push({ number: pr.number, title: pr.title, reason: ciReason });
                continue;
              }

              core.info(`   ✅ Ready — ${conflictReason} | ${ciReason}`);

              if (DRY_RUN) {
                core.info(`   🔍 [DRY RUN] Would merge PR #${pr.number}`);
                summary.merged.push({ number: pr.number, title: pr.title, branch: pr.head.ref, dry_run: true });
                continue;
              }

              // ③ Approve (best-effort — non-fatal if it fails)
              await approvePR(pr.number);

              // ④ Merge
              try {
                await github.rest.pulls.merge({
                  owner, repo,
                  pull_number:    pr.number,
                  merge_method:   'squash',
                  commit_title:   `${pr.title} (#${pr.number})`,
                  commit_message: [
                    'Automatically merged by DreamCo Autonomous PR Manager.',
                    '',
                    `CI checks  : ✅ passed`,
                    `Conflicts  : ✅ none`,
                    `Merged by  : github-actions[bot]`,
                    `Timestamp  : ${new Date().toISOString()}`,
                  ].join('\n'),
                });

                core.info(`   🎉 MERGED PR #${pr.number}`);
                summary.merged.push({ number: pr.number, title: pr.title, branch: pr.head.ref });

                // ⑤ Delete source branch (only when it lives in this repo)
                const isSameRepo = pr.head.repo &&
                  pr.head.repo.full_name === `${owner}/${repo}`;
                if (isSameRepo) {
                  try {
                    await github.rest.git.deleteRef({
                      owner, repo,
                      ref: `heads/${pr.head.ref}`,
                    });
                    core.info(`   🗑️  Deleted branch: ${pr.head.ref}`);
                  } catch (delErr) {
                    core.warning(`   ⚠️  Could not delete branch "${pr.head.ref}": ${delErr.message}`);
                  }
                } else {
                  core.info(`   ℹ️  Branch "${pr.head.ref}" is in a fork — skipping deletion.`);
                }

              } catch (mergeErr) {
                core.error(`   ❌ Merge failed: ${mergeErr.message}`);
                summary.failed.push({ number: pr.number, title: pr.title, error: mergeErr.message });
              }

              // Brief pause between merges to avoid race conditions on the
              // base branch and to respect secondary-rate limits.
              await sleep(2000);
            }

            // ── Final summary ────────────────────────────────────────

            core.info('');
            core.info('═══════════════════════════════════════════════════');
            core.info('  DreamCo Autonomous PR Manager — Run Summary');
            core.info('═══════════════════════════════════════════════════');
            core.info(`Total PRs found : ${summary.total}`);
            core.info(`Batch processed : ${batch.length}`);
            core.info(`✅ Merged        : ${summary.merged.length}`);
            core.info(`⏭️  Skipped       : ${summary.skipped.length}`);
            core.info(`❌ Failed        : ${summary.failed.length}`);

            if (summary.merged.length > 0) {
              core.info('');
              core.info('Merged:');
              summary.merged.forEach(p =>
                core.info(`  #${p.number} — ${p.title}${p.dry_run ? ' [DRY RUN]' : ''}`)
              );
            }
            if (summary.skipped.length > 0) {
              core.info('');
              core.info('Skipped:');
              summary.skipped.forEach(p =>
                core.info(`  #${p.number} — ${p.title}  (${p.reason})`)
              );
            }
            if (summary.failed.length > 0) {
              core.info('');
              core.warning('Failed:');
              summary.failed.forEach(p =>
                core.warning(`  #${p.number} — ${p.title}: ${p.error}`)
              );
            }

            // Expose outputs for the summary step
            core.setOutput('merged_count',  String(summary.merged.length));
            core.setOutput('skipped_count', String(summary.skipped.length));
            core.setOutput('failed_count',  String(summary.failed.length));
            core.setOutput('total_count',   String(summary.total));

            // Fail the step (and emit a visible annotation) when merges fail
            if (summary.failed.length > 0) {
              core.setFailed(
                `⚠️  ${summary.failed.length} PR(s) failed to merge — review the logs above.`
              );
            }

      # ─────────────────────────────────────────────────────────────────
      # 3. Write a human-readable summary to the GitHub Actions job page
      # ─────────────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          MERGED="${{ steps.merge.outputs.merged_count || '0' }}"
          SKIPPED="${{ steps.merge.outputs.skipped_count || '0' }}"
          FAILED="${{ steps.merge.outputs.failed_count || '0' }}"
          TOTAL="${{ steps.merge.outputs.total_count || '0' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          {
            echo "## 🤖 DreamCo Autonomous PR Manager"
            echo ""
            if [ "$DRY_RUN" = "true" ]; then
              echo "> ⚠️ **Dry-run mode** — no PRs were actually merged."
              echo ""
            fi
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| 📋 Total open PRs | ${TOTAL} |"
            echo "| ✅ Merged | ${MERGED} |"
            echo "| ⏭️ Skipped (not ready) | ${SKIPPED} |"
            echo "| ❌ Failed | ${FAILED} |"
            echo ""
            echo "_Triggered: \`${{ github.event_name }}\` · $(date -u '+%Y-%m-%d %H:%M:%S UTC')_"
          } >> "$GITHUB_STEP_SUMMARY"
