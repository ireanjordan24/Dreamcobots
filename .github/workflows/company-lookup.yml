name: Company Lookup Bot

on:
  workflow_dispatch:
    inputs:
      companies:
        description: >
          Comma-separated list of company names to look up
          (e.g. "Stripe, Shopify, OpenAI")
        required: true
        default: "Stripe"
      tier:
        description: "Bot tier: free | pro | enterprise"
        required: false
        default: "pro"
  schedule:
    # Run daily at 09:00 UTC for autonomous refreshes
    - cron: "0 9 * * *"

concurrency:
  group: company-lookup-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate manual inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          COMPANIES="${{ github.event.inputs.companies }}"
          TIER="${{ github.event.inputs.tier }}"

          if [ -z "${COMPANIES// }" ]; then
            echo "companies input cannot be empty"
            exit 1
          fi

          case "${TIER,,}" in
            free|pro|enterprise) ;;
            *)
              echo "tier input must be one of: free, pro, enterprise"
              exit 1
              ;;
          esac

      - name: Static integrity checks
        run: |
          python -m compileall -q bots/company_lookup_bot
          python -m pip check

      - name: Run company lookup tests
        run: python -m pytest tests/test_company_lookup_bot.py -q

  lookup:
    name: Look Up Companies
    needs: quality-gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Company Lookup Bot
        env:
          CRUNCHBASE_API_KEY: ${{ secrets.CRUNCHBASE_API_KEY }}
          CLEARBIT_API_KEY: ${{ secrets.CLEARBIT_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          BOT_TIER: ${{ github.event.inputs.tier || 'pro' }}
          COMPANY_NAMES: ${{ github.event.inputs.companies || 'Stripe' }}
        run: |
          python - <<'EOF'
          import sys, os
          sys.path.insert(0, ".")

          from bots.company_lookup_bot.company_lookup_bot import CompanyLookupBot
          from bots.company_lookup_bot.tiers import Tier

          tier_map = {"free": Tier.FREE, "pro": Tier.PRO, "enterprise": Tier.ENTERPRISE}
          tier = tier_map.get(os.getenv("BOT_TIER", "pro").lower(), Tier.PRO)
          raw_names = os.getenv("COMPANY_NAMES", "Stripe")
          names = [n.strip() for n in raw_names.split(",") if n.strip()]

          bot = CompanyLookupBot(tier=tier)
          print(f"Running CompanyLookupBot (tier={tier.value}) for: {names}")
          for name in names:
              result = bot.lookup(name)
              company = result["company"]
              print(f"  ✓ {company.get('name')} | {company.get('domain')} | {company.get('industry', '')}")
              if result["recommendations"]:
                  print("    Recommendations:")
                  for rec in result["recommendations"][:3]:
                      print(f"      • {rec['platform']}: {rec['reason'][:80]}")

          summary = bot.get_summary()
          print(f"\nSummary: {summary['lookups_this_session']} looked up, "
                f"{summary['total_companies_stored']} total stored")
          EOF

      - name: Open PR with updated companies data
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(data): update companies.json via Company Lookup Bot [skip ci]"
          title: "chore(data): update companies.json via Company Lookup Bot"
          body: |
            Automated data update from Company Lookup Bot.

            - Source workflow: `${{ github.workflow }}`
            - Run: `${{ github.run_number }}`
          branch: chore/company-lookup-data-update
          delete-branch: true
          add-paths: |
            data/companies.json
          labels: |
            automated-update
            company-lookup

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            python - <<'PYEOF'
          import json, urllib.request, os
          url = os.environ["SLACK_WEBHOOK_URL"]
          payload = json.dumps({
              "text": (
                  ":x: *Company Lookup Bot FAILED* — "
                  f"workflow run #{os.environ.get('GITHUB_RUN_NUMBER', '?')} "
                  f"on `{os.environ.get('GITHUB_REF_NAME', 'unknown')}`\n"
                  f"> Repo: {os.environ.get('GITHUB_REPOSITORY', '')}"
              )
          }).encode()
          req = urllib.request.Request(url, data=payload,
                                        headers={"Content-Type": "application/json"})
          urllib.request.urlopen(req, timeout=10)
          PYEOF
          fi
