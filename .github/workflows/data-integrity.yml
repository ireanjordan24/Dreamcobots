# Data Integrity Workflow
# ========================
# Ensures nothing is ever lost or duplicated when updating a branch, file,
# or the main branch in DreamCo-Technologies/Dreamcobots.
#
# Triggered on:
#   - Every pull request targeting main (opened, synchronized, reopened)
#   - Direct pushes to main (post-merge audit)
#
# Checks performed:
#   1. Duplicate files (files with identical content)
#   2. Duplicate code symbols (same function/class name in multiple files)
#   3. Data loss risk (critical files deleted by this change-set)
#   4. Unresolved merge-conflict markers
#   5. Full change audit log
#
# On failure the job exits non-zero, blocking the PR from merging.
# A detailed Markdown report is posted as a PR comment (PRs only).

name: Data Integrity Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  data-integrity:
    name: Data Integrity — No Duplicates, No Data Loss
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout full history so diff commands work ─────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for accurate diffs

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Determine base and head refs ────────────────────────────────────
      - name: Resolve diff refs
        id: refs
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            # Push to main: compare against the previous commit
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            # Fallback: if before is the zero SHA (first push) compare HEAD~1
            if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="HEAD~1"
            fi
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"
          echo "[data-integrity] Diffing  $BASE  →  $HEAD"

      # ── 4. Run data integrity checks ──────────────────────────────────────
      - name: Run data integrity checks
        id: integrity
        shell: bash
        run: |
          python .github/scripts/check_data_integrity.py \
            --base "${{ steps.refs.outputs.base }}" \
            --head "${{ steps.refs.outputs.head }}" \
            --output-json /tmp/integrity-report.json \
            --output-md  /tmp/integrity-report.md
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          # Always capture the status field from JSON for later steps
          STATUS=$(python -c "import json,sys; d=json.load(open('/tmp/integrity-report.json')); print(d.get('status','UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE
        continue-on-error: true   # allow next steps to run so we can post the comment

      # ── 5. Upload reports as artifacts ────────────────────────────────────
      - name: Upload integrity report (JSON)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integrity-report-json
          path: /tmp/integrity-report.json
          retention-days: 30

      - name: Upload integrity report (Markdown)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integrity-report-md
          path: /tmp/integrity-report.md
          retention-days: 30

      # ── 6. Post PR comment (PRs only) ─────────────────────────────────────
      - name: Post PR comment with integrity report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let body;
            try {
              body = fs.readFileSync('/tmp/integrity-report.md', 'utf8');
            } catch {
              body = '⚠️ Could not read integrity report.';
            }

            // Find and update existing bot comment, or create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('DreamCobots Data Integrity Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log('Updated existing integrity comment.');
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created new integrity comment.');
            }

      # ── 7. Fail the job if blocking issues were found ─────────────────────
      - name: Enforce integrity gate
        if: steps.integrity.outputs.exit_code != '0'
        shell: bash
        run: |
          echo "::error::Data integrity check FAILED (status: ${{ steps.integrity.outputs.status }})."
          echo "::error::Review the integrity report artifact and the PR comment for details."
          echo "::error::Fix all blocking issues before this PR can be merged."
          exit 1

      # ── 8. Summary for the Actions UI ─────────────────────────────────────
      - name: Write job summary
        if: always()
        shell: bash
        run: |
          STATUS="${{ steps.integrity.outputs.status }}"
          if [ -f /tmp/integrity-report.md ]; then
            cat /tmp/integrity-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Data Integrity Report" >> "$GITHUB_STEP_SUMMARY"
            echo "Status: $STATUS" >> "$GITHUB_STEP_SUMMARY"
          fi
