# This is a GitHub Actions CI/CD workflow file for testing all bots in the Dreamcobots repository.

name: CI for Dreamcobots

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'  # Change as per your requirement

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt  # Ensure a requirements.txt is in the root of your repo

    - name: Run tests
      run: |
        pytest  # Ensure you have pytest installed and configured for your tests
