# DreamCo CI — Unified pipeline for Python, JavaScript, and Java bots.
# Replaces: ci.yml (old), ci-cd.yml, bot-ci.yml, test_bots.yml

name: DreamCo CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  # ── Python: dependency management, bot framework compliance, pytest ────────
  test-python:
    name: Python Tests & Bot Compliance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check bot framework compliance
        run: python tools/check_bot_framework.py

      - name: Run Python tests
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_PRO: ${{ secrets.STRIPE_PRICE_PRO }}
          STRIPE_PRICE_ENTERPRISE: ${{ secrets.STRIPE_PRICE_ENTERPRISE }}
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_backend.py \
            --ignore=tests/test_web_dashboard.py \
            -q --tb=short

  # ── JavaScript: install deps, run Jest tests ──────────────────────────────
  test-js:
    name: JavaScript Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm test

  # ── Java bots: validate structure and smoke-test ──────────────────────────
  test-java-bots:
    name: Java Bot Structure Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Verify Java bot structure
        run: |
          if [ -d java_bots ] && find java_bots -name "*.java" | grep -q .; then
            echo "Java bots found:"
            find java_bots -name "*.java"
            echo "Java bot structure check passed."
          else
            echo "No Java bots found in java_bots/ — skipping."
          fi
