# CI Configuration for Python Testing

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Check for merge conflict markers
        run: |
          echo "Scanning for unresolved merge conflict markers..."
          if grep -rn --include="*.py" -E -l "^<<<<<<<|^>>>>>>>|^=======$" . 2>/dev/null | grep -v ".git"; then
            echo "❌ Unresolved merge conflicts detected in the files listed above."
            exit 1
          else
            echo "✅ No merge conflict markers found."
          fi

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check bot framework compliance
        run: python tools/check_bot_framework.py

      - name: Run tests with pytest
        run: |
          python -m pytest tests/ -q --tb=short

      - name: Report test status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ All tests passed for Python ${{ matrix.python-version }}."
          else
            echo "❌ Tests or checks failed for Python ${{ matrix.python-version }} — review the output above."
          fi