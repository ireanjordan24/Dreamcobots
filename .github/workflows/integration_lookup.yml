name: Integration Lookup Automation

on:
  workflow_dispatch: # Creates a manual trigger in the Actions page
    inputs:
      query:
        description: "Enter the query for integration opportunities"
        required: true
        default: "default integration query"
  workflow_call:
    inputs:
      query:
        description: Query for integration opportunities.
        required: false
        type: string
        default: "default integration query"

jobs:
  integration_lookup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install jsonschema

    - name: Validate integration_lookup.json schema
      run: |
        python - <<'PY'
        import json, sys, os
        from jsonschema import validate, ValidationError

        schema = {
            "type": "object",
            "required": ["last_updated", "total_queries", "queries"],
            "properties": {
                "last_updated": {"type": ["string", "null"]},
                "total_queries": {"type": "integer"},
                "queries": {"type": "object"},
            },
            "additionalProperties": False,
        }

        path = "data/integration_lookup.json"
        if not os.path.exists(path):
            print(f"WARNING: {path} not found — will be created by lookup script.")
            sys.exit(0)

        with open(path) as fh:
            data = json.load(fh)

        try:
            validate(instance=data, schema=schema)
            print(f"Schema validation passed for {path}")
        except ValidationError as exc:
            print(f"Schema validation FAILED: {exc.message}", file=sys.stderr)
            sys.exit(1)
        PY

    - name: Run Integration Lookup Script
      run: |
        QUERY="${{ inputs.query || github.event.inputs.query || 'default integration query' }}"
        echo "Looking up integration opportunities for: ${QUERY}"
        python scripts/integration_lookup.py "${QUERY}"
        git config user.name "GitHub Bot"
        git config user.email "bot@example.com"
        git add data/integration_lookup.json
        if git diff --cached --quiet; then
          echo "No integration lookup changes to commit."
        else
          git commit -m "chore(data): update integration lookup"
          git push
        fi

    - name: Confirm Success
      run: echo "Integration lookup completed successfully."

    - name: Trigger Integration Feedback workflow
      if: success()
      uses: actions/github-script@v9
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'integration-feedback.yml',
            ref: context.ref.replace('refs/heads/', ''),
            inputs: {
              platform: 'Integration Lookup Bot',
              status: 'success',
              details: 'Integration lookup workflow completed.',
              version: context.sha.slice(0, 7),
              tier: 'pro',
            },
          });
