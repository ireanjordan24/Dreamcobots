<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DreamCo Control Tower</title>
  <!-- React 18 CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel for JSX in browser (dev convenience) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #0d0d0d; --surface: #1a1a2e; --border: #2a2a4a;
      --accent: #00d4aa; --accent2: #7b61ff; --live: #00e676;
      --warn: #ffab40; --err: #ff6b6b; --text: #e0e0e0; --muted: #888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
    a { color: var(--accent); }

    /* Header */
    header {
      background: linear-gradient(90deg, #1a1a2e, #16213e);
      padding: 16px 28px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 2px solid var(--accent);
    }
    header h1 { font-size: 1.5rem; color: var(--accent); letter-spacing: 1px; }
    .header-meta { font-size: 0.78rem; color: var(--muted); }

    /* Tabs */
    .tabs { display: flex; background: #111; border-bottom: 1px solid var(--border); padding: 0 24px; }
    .tab {
      padding: 11px 18px; cursor: pointer; font-size: 0.82rem; color: var(--muted);
      border-bottom: 3px solid transparent; user-select: none; transition: color 0.15s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }

    /* Layout */
    .page { padding: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }

    /* Cards */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 18px;
    }
    .card-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .card-value { font-size: 1.9rem; font-weight: 700; color: var(--accent); }
    .card-sub { font-size: 0.7rem; color: #555; margin-top: 4px; }
    .card-value.live { color: var(--live); }
    .card-value.warn { color: var(--warn); }
    .card-value.err  { color: var(--err); }

    /* Tables */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 0.7rem; color: var(--muted); border-bottom: 1px solid var(--border); padding: 6px 6px; }
    td { font-size: 0.78rem; padding: 7px 6px; border-bottom: 1px solid #161625; }

    /* Badges */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.66rem; font-weight: 700; }
    .badge-live     { background: #0c2b1e; color: var(--live); }
    .badge-ok       { background: #0c2b1e; color: var(--accent); }
    .badge-idle     { background: #1a1a1a; color: var(--muted); }
    .badge-offline  { background: #2a1010; color: var(--err); }
    .badge-error    { background: #2a1010; color: var(--err); }
    .badge-warn     { background: #2a1e00; color: var(--warn); }
    .badge-unknown  { background: #1a1a1a; color: var(--muted); }

    /* Buttons */
    .btn {
      display: inline-block; padding: 8px 16px; border-radius: 6px; font-size: 0.78rem;
      font-weight: 600; cursor: pointer; border: none; transition: opacity 0.15s;
    }
    .btn-primary   { background: var(--accent); color: #0d0d0d; }
    .btn-secondary { background: var(--surface); color: var(--accent); border: 1px solid var(--accent); }
    .btn-danger    { background: #3d1010; color: var(--err); border: 1px solid var(--err); }
    .btn:hover { opacity: 0.82; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }

    /* Forms */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { margin-bottom: 14px; }
    label { font-size: 0.74rem; color: var(--muted); display: block; margin-bottom: 4px; }
    input, select {
      background: #111; border: 1px solid var(--border); color: var(--text);
      padding: 8px 12px; border-radius: 6px; font-size: 0.78rem; width: 100%;
    }

    /* Alerts */
    .alert { padding: 10px 14px; border-radius: 6px; font-size: 0.78rem; margin-bottom: 14px; }
    .alert-success { background: #0d2a1e; color: var(--live); }
    .alert-error   { background: #2a0e0e; color: var(--err); }
    .alert-info    { background: #0d1a2e; color: var(--accent); }

    /* Section title */
    .section-title { font-size: 0.95rem; color: var(--accent); font-weight: 600; margin-bottom: 14px; }
    .empty { color: #555; text-align: center; padding: 20px 0; font-size: 0.8rem; }
    footer { text-align: center; color: #333; padding: 20px; font-size: 0.72rem; }
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    .dot-live { background: var(--live); }
    .dot-offline { background: var(--err); }
    .spinner { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API = '';  // same origin — relative URLs

// ---------- Utilities ----------
function Badge({ status }) {
  const cls = {
    live:'live', ok:'ok', idle:'idle', offline:'offline', error:'error',
    unknown:'unknown', updated:'ok', running:'ok', conflict_detected:'warn',
    failure:'error', success:'ok',
  }[status] || 'unknown';
  return <span className={`badge badge-${cls}`}>{status}</span>;
}

function KpiCard({ label, value, sub, variant }) {
  return (
    <div className="card">
      <div className="card-label">{label}</div>
      <div className={`card-value${variant ? ' ' + variant : ''}`}>{value ?? '—'}</div>
      {sub && <div className="card-sub">{sub}</div>}
    </div>
  );
}

function Alert({ type, msg, onDismiss }) {
  if (!msg) return null;
  return (
    <div className={`alert alert-${type}`} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span>{msg}</span>
      {onDismiss && <span style={{cursor:'pointer',marginLeft:12}} onClick={onDismiss}>✕</span>}
    </div>
  );
}

async function apiFetch(path, opts = {}) {
  const resp = await fetch(API + path, opts);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ error: resp.statusText }));
    throw new Error(err.error || resp.statusText);
  }
  return resp.json();
}

// ---------- Tabs ----------
const TABS = [
  { id: 'overview',   label: '📊 Overview' },
  { id: 'bots',       label: '🤖 Bots' },
  { id: 'github',     label: '🔗 GitHub' },
  { id: 'revenue',    label: '💰 Revenue' },
  { id: 'deploy',     label: '🚀 Deploy' },
  { id: 'automation', label: '⚙️ Automation' },
];

// ---------- Overview Tab ----------
function OverviewTab() {
  const [data, setData] = useState(null);
  useEffect(() => {
    (async () => {
      const [bots, hb, rev] = await Promise.all([
        apiFetch('/api/bots').catch(() => ({ bots: [], total: 0 })),
        apiFetch('/api/heartbeat').catch(() => ({ live: 0, offline: 0, total: 0, bots: {} })),
        apiFetch('/api/revenue').catch(() => ({ total_usd: 0 })),
      ]);
      setData({ bots, hb, rev });
    })();
    const iv = setInterval(async () => {
      const [bots, hb, rev] = await Promise.all([
        apiFetch('/api/bots').catch(() => ({ bots: [], total: 0 })),
        apiFetch('/api/heartbeat').catch(() => ({ live: 0, offline: 0, total: 0, bots: {} })),
        apiFetch('/api/revenue').catch(() => ({ total_usd: 0 })),
      ]);
      setData({ bots, hb, rev });
    }, 15000);
    return () => clearInterval(iv);
  }, []);

  if (!data) return <div className="page empty">Loading overview…</div>;

  const allBots = data.bots.bots || [];
  return (
    <div className="page">
      <div className="grid">
        <KpiCard label="Live Bots" value={data.hb.live} sub="heartbeat active" variant="live" />
        <KpiCard label="Offline Bots" value={data.hb.offline} sub="missed heartbeat" variant="err" />
        <KpiCard label="Total Bots" value={data.bots.total} sub="in registry" />
        <KpiCard label="Revenue" value={'$' + (data.rev.total_usd ?? 0).toFixed(2)} sub="all providers (USD)" />
      </div>
      <div className="card">
        <div className="section-title">Bot Status</div>
        <table>
          <thead><tr><th>Bot</th><th>Status</th><th>Tier</th><th>Niche</th><th>Heartbeat</th></tr></thead>
          <tbody>
            {allBots.length ? allBots.map(b => (
              <tr key={b.name}>
                <td><strong>{b.name}</strong></td>
                <td><Badge status={b.status} /></td>
                <td>{b.tier}</td>
                <td>{b.niche || '—'}</td>
                <td>
                  <span className={`dot dot-${b.heartbeat?.status || 'offline'}`}></span>
                  {b.heartbeat?.status || 'offline'}
                  {b.heartbeat?.msSincePing != null ? ` (${Math.round(b.heartbeat.msSincePing/1000)}s ago)` : ''}
                </td>
              </tr>
            )) : (
              <tr><td colSpan="5" className="empty">No bots found in registry.</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ---------- Bots Tab ----------
function BotsTab() {
  const [bots, setBots] = useState([]);
  const [loading, setLoading] = useState(true);
  const [alert, setAlert] = useState(null);

  useEffect(() => {
    apiFetch('/api/bots').then(d => { setBots(d.bots || []); setLoading(false); }).catch(() => setLoading(false));
  }, []);

  async function pingBot(name) {
    try {
      await apiFetch(`/api/bots/${name}/ping`, { method: 'POST' });
      setAlert({ type: 'success', msg: `✅ Heartbeat pinged for ${name}` });
      const d = await apiFetch('/api/bots');
      setBots(d.bots || []);
    } catch (e) { setAlert({ type: 'error', msg: e.message }); }
  }

  async function pullBot(name) {
    try {
      const r = await apiFetch(`/api/bots/${name}/pull`, { method: 'POST' });
      setAlert({ type: r.success ? 'success' : 'error', msg: r.success ? `✅ ${name} updated` : `⚠️ ${r.error}` });
    } catch (e) { setAlert({ type: 'error', msg: e.message }); }
  }

  if (loading) return <div className="page empty">Loading bots…</div>;

  return (
    <div className="page">
      <Alert type={alert?.type} msg={alert?.msg} onDismiss={() => setAlert(null)} />
      <div className="card">
        <div className="section-title">All Bots ({bots.length})</div>
        <table>
          <thead><tr><th>Bot</th><th>Tier</th><th>Niche</th><th>Status</th><th>Heartbeat</th><th>Actions</th></tr></thead>
          <tbody>
            {bots.length ? bots.map(b => (
              <tr key={b.name}>
                <td><strong>{b.name}</strong></td>
                <td>{b.tier}</td>
                <td>{b.niche || '—'}</td>
                <td><Badge status={b.status} /></td>
                <td>
                  <span className={`dot dot-${b.heartbeat?.status || 'offline'}`}></span>
                  {b.heartbeat?.status || 'offline'}
                </td>
                <td style={{display:'flex',gap:6}}>
                  <button className="btn btn-secondary" style={{padding:'4px 10px',fontSize:'0.7rem'}} onClick={() => pingBot(b.name)}>Ping</button>
                  <button className="btn btn-secondary" style={{padding:'4px 10px',fontSize:'0.7rem'}} onClick={() => pullBot(b.name)}>Pull</button>
                </td>
              </tr>
            )) : (
              <tr><td colSpan="6" className="empty">No bots configured.</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ---------- GitHub Tab ----------
function GithubTab() {
  const [repo, setRepo] = useState('Dreamcobots');
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState(false);

  async function checkRepo() {
    setLoading(true);
    try {
      const data = await apiFetch(`/api/repos/${encodeURIComponent(repo)}`);
      setStatus(data);
    } catch (e) { setStatus({ error: e.message, online: false, repo }); }
    setLoading(false);
  }

  return (
    <div className="page">
      <div className="section-title">GitHub Repository Status</div>
      <div style={{display:'flex',gap:10,marginBottom:16,alignItems:'flex-end',maxWidth:540}}>
        <div style={{flex:1}}>
          <label>Repository name</label>
          <input value={repo} onChange={e => setRepo(e.target.value)} placeholder="e.g. Dreamcobots" />
        </div>
        <button className="btn btn-primary" onClick={checkRepo} disabled={loading}>
          {loading ? <span className="spinner">⏳</span> : 'Check Repo'}
        </button>
      </div>
      {status && (
        <div className="card" style={{maxWidth:700}}>
          <div className="section-title">{status.repo} — <Badge status={status.online ? 'live' : 'offline'} /></div>
          {status.error && <div className="alert alert-error">{status.error}</div>}
          <table>
            <tbody>
              <tr><td>Open PRs</td><td>{status.openPRs ?? '—'}</td></tr>
              <tr><td>Last Commit</td><td>{status.lastCommitSha ? `${status.lastCommitSha} — ${status.lastCommitMessage}` : '—'}</td></tr>
              <tr><td>Commit Time</td><td>{status.lastCommitAt || '—'}</td></tr>
              <tr><td>Last Workflow</td><td>{status.lastWorkflowName || '—'} <Badge status={status.lastWorkflowStatus ?? 'unknown'} /></td></tr>
              {status.conflictAlert && <tr><td colSpan="2"><div className="alert alert-error">⚠️ Workflow failure — consider running Auto-Upgrade.</div></td></tr>}
              {status.highPRAlert && <tr><td colSpan="2"><div className="alert" style={{background:'#2a1e00',color:'#ffab40'}}>{status.openPRs} open PRs — review recommended.</div></td></tr>}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ---------- Revenue Tab ----------
function RevenueTab() {
  const [rev, setRev] = useState(null);
  useEffect(() => {
    apiFetch('/api/revenue').then(setRev).catch(() => {});
  }, []);

  if (!rev) return <div className="page empty">Loading revenue data…</div>;

  const providers = rev.by_provider || {};
  return (
    <div className="page">
      <div className="grid">
        <KpiCard label="Total Revenue" value={'$' + (rev.total_usd ?? 0).toFixed(2)} sub="all providers" />
        {Object.entries(providers).map(([k, v]) => (
          <KpiCard key={k} label={k.charAt(0).toUpperCase()+k.slice(1)} value={'$' + (v.total ?? 0).toFixed(2)} sub={v.error ? '⚠️ ' + v.error : 'USD'} />
        ))}
      </div>
      <div className="alert alert-info">
        💡 To enable live revenue tracking, set <strong>STRIPE_SECRET_KEY</strong>, <strong>PAYPAL_CLIENT_ID</strong>, and <strong>PAYPAL_CLIENT_SECRET</strong> in your environment.
      </div>
    </div>
  );
}

// ---------- Deploy Tab ----------
function DeployTab() {
  const [form, setForm] = useState({ bot_name:'', repo_name:'', tier:'free', niche:'' });
  const [alert, setAlert] = useState(null);
  const [loading, setLoading] = useState(false);

  async function deploy(e) {
    e.preventDefault();
    if (!form.bot_name.trim()) { setAlert({ type:'error', msg:'Bot name is required.' }); return; }
    setLoading(true);
    try {
      const resp = await fetch(API + '/api/bots', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(form),
      });
      const data = await resp.json();
      if (resp.ok || resp.status === 201) {
        setAlert({ type:'success', msg:`✅ Bot "${form.bot_name}" registered! Status: ${data.status || 'ok'}` });
        setForm({ bot_name:'', repo_name:'', tier:'free', niche:'' });
      } else {
        setAlert({ type:'error', msg: data.error || 'Deployment failed.' });
      }
    } catch (e) { setAlert({ type:'error', msg: e.message }); }
    setLoading(false);
  }

  return (
    <div className="page">
      <div className="section-title">🚀 One-Click Bot Deployment</div>
      <div style={{maxWidth:540}}>
        <Alert type={alert?.type} msg={alert?.msg} onDismiss={() => setAlert(null)} />
        <div className="card">
          <form onSubmit={deploy}>
            <div className="form-grid">
              <div className="form-group">
                <label>Bot Name *</label>
                <input value={form.bot_name} onChange={e => setForm({...form, bot_name: e.target.value})} placeholder="e.g. real_estate_bot" />
              </div>
              <div className="form-group">
                <label>GitHub Repo Name</label>
                <input value={form.repo_name} onChange={e => setForm({...form, repo_name: e.target.value})} placeholder="e.g. Dreamcobots" />
              </div>
              <div className="form-group">
                <label>Tier</label>
                <select value={form.tier} onChange={e => setForm({...form, tier: e.target.value})}>
                  <option value="free">Free ($0/mo)</option>
                  <option value="pro">Pro ($99/mo)</option>
                  <option value="enterprise">Enterprise ($299/mo)</option>
                </select>
              </div>
              <div className="form-group">
                <label>Niche / Template</label>
                <select value={form.niche} onChange={e => setForm({...form, niche: e.target.value})}>
                  <option value="">General</option>
                  <option value="real_estate">Real Estate</option>
                  <option value="sales">Sales / Lead Gen</option>
                  <option value="fiverr">Fiverr Gigs</option>
                  <option value="crypto">Crypto / Trading</option>
                  <option value="affiliate">Affiliate Marketing</option>
                </select>
              </div>
            </div>
            <button type="submit" className="btn btn-primary" style={{width:'100%'}} disabled={loading}>
              {loading ? '⏳ Deploying…' : '🚀 Deploy Bot'}
            </button>
          </form>
        </div>
      </div>
    </div>
  );
}

// ---------- Automation Tab ----------
function AutomationTab() {
  const [hb, setHb] = useState(null);
  const [log, setLog] = useState(null);
  const [alert, setAlert] = useState(null);
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    apiFetch('/api/heartbeat').then(setHb).catch(() => {});
  }, []);

  async function upgradeAll() {
    setLoading(true);
    setAlert({ type:'info', msg:'⏳ Running auto-upgrade…' });
    try {
      const data = await apiFetch('/api/upgrade-all', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ dry_run: true }) });
      setLog(data);
      setAlert({ type:'success', msg:`✅ Upgrade complete: ${data.succeeded}/${data.total} succeeded.` });
      const hbData = await apiFetch('/api/heartbeat').catch(() => hb);
      setHb(hbData);
    } catch (e) { setAlert({ type:'error', msg: e.message }); }
    setLoading(false);
  }

  const hbBots = hb ? Object.entries(hb.bots || {}) : [];

  return (
    <div className="page">
      <div className="section-title">⚙️ Automation Controls</div>
      <Alert type={alert?.type} msg={alert?.msg} onDismiss={() => setAlert(null)} />
      <div className="btn-row">
        <button className="btn btn-primary" onClick={upgradeAll} disabled={loading}>
          {loading ? '⏳ Running…' : '⚡ Auto-Upgrade All Bots'}
        </button>
        <button className="btn btn-secondary" onClick={() => apiFetch('/api/heartbeat').then(setHb).catch(() => {})}>
          🔄 Refresh Heartbeat
        </button>
      </div>

      <div className="card" style={{marginBottom:20}}>
        <div className="section-title">Heartbeat Monitor ({hb?.total ?? 0} bots)</div>
        <table>
          <thead><tr><th>Bot</th><th>Status</th><th>Last Ping</th><th>Seconds Ago</th></tr></thead>
          <tbody>
            {hbBots.length ? hbBots.map(([name, s]) => (
              <tr key={name}>
                <td>{name}</td>
                <td><Badge status={s.status} /></td>
                <td>{s.lastPing ? new Date(s.lastPing).toLocaleString() : '—'}</td>
                <td>{s.msSincePing != null ? Math.round(s.msSincePing/1000) + 's' : '—'}</td>
              </tr>
            )) : <tr><td colSpan="4" className="empty">No heartbeat data yet. Ping bots from the Bots tab.</td></tr>}
          </tbody>
        </table>
      </div>

      {log && (
        <div className="card">
          <div className="section-title">Last Auto-Upgrade Results</div>
          <table>
            <thead><tr><th>Bot</th><th>Repo</th><th>Result</th><th>Dry-Run</th><th>Time</th></tr></thead>
            <tbody>
              {(log.results || []).map((r, i) => (
                <tr key={i}>
                  <td>{r.name}</td>
                  <td>{r.repo || '—'}</td>
                  <td><Badge status={r.success ? 'ok' : 'error'} /></td>
                  <td>{r.dry_run ? 'Yes' : 'No'}</td>
                  <td>{new Date(r.timestamp).toLocaleString()}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ---------- Root App ----------
function App() {
  const [activeTab, setActiveTab] = useState('overview');
  const [ts, setTs] = useState(new Date().toLocaleString());

  useEffect(() => {
    const iv = setInterval(() => setTs(new Date().toLocaleString()), 5000);
    return () => clearInterval(iv);
  }, []);

  const tab = {
    overview:   <OverviewTab />,
    bots:       <BotsTab />,
    github:     <GithubTab />,
    revenue:    <RevenueTab />,
    deploy:     <DeployTab />,
    automation: <AutomationTab />,
  }[activeTab];

  return (
    <>
      <header>
        <div>
          <h1>🏰 DreamCo Control Tower</h1>
          <div className="header-meta">GLOBAL AI SOURCES FLOW · {ts}</div>
        </div>
      </header>
      <div className="tabs">
        {TABS.map(t => (
          <div key={t.id} className={`tab${activeTab === t.id ? ' active' : ''}`}
               onClick={() => setActiveTab(t.id)}>{t.label}</div>
        ))}
      </div>
      {tab}
      <footer>DreamCo Control Tower v1.0 — Powered by GLOBAL AI SOURCES FLOW</footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
