version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: dreamco
      POSTGRES_USER: dreamco
      POSTGRES_PASSWORD: dreamco_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dreamco"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://dreamco:dreamco_secret@db:5432/dreamco"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
